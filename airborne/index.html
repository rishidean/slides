u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:25px;line-height:1.32;color:#6B6B6B;margin-bottom:22px;\">Promote durable learnings to permanent context.<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#B5B5B5;margin-bottom:10px;\">Learning<\u002Fdiv>\n<pre style=\"margin:0 -30px;background:#0E0E0E;border-top:1px solid #232323;border-radius:0 0 14px 14px;padding:20px 26px;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.6;color:#D8D8D8;white-space:pre;\"><span style=\"color:#9A9A9A;\">## Gotchas<\u002Fspan>\n<span style=\"color:#FF6FC8;\">+<\u002Fspan> score must never go\n<span style=\"color:#FF6FC8;\">+<\u002Fspan> negative — guard spend<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>34<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<section data-label=\"The Orchestrator\" data-speaker-notes=\"Open run.sh. Read it. It's a while loop. While there are unchecked boxes and we haven't hit the max: launch a Claude session with the prompt. If anything gets blocked, stop. That's the orchestrator. It's dumb on purpose — all the intelligence is in the files it reads. Ten lines of bash running a multi-sprint autonomous development pipeline.\" style=\"width:100%;height:100%;background:#000000;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:84px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#6B6B6B;\">\n    <span>THE ORCHESTRATOR<\u002Fspan><span>run.sh<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:36px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:26px 0 0;font-weight:700;font-size:54px;letter-spacing:-0.03em;line-height:1.0;\">Ten lines. Dead simple by design.<\u002Fh2>\n  <div style=\"margin-top:56px;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:38px 44px;font-family:'JetBrains Mono',monospace;font-size:27px;line-height:1.75;\">\n    <div style=\"color:#6B6B6B;\">#!/usr/bin/env bash<\u002Fdiv>\n    <div style=\"color:#D8D8D8;\">set -euo pipefail<\u002Fdiv>\n    <div style=\"color:#D8D8D8;\">MAX=4; n=0<\u002Fdiv>\n    <div><span style=\"color:#FF6FC8;\">while<\u002Fspan><span style=\"color:#D8D8D8;\"> grep -q <\u002Fspan><span style=\"color:#9ED49E;\">'^- \\[ \\]'<\u002Fspan><span style=\"color:#D8D8D8;\"> roadmap.md &amp;&amp; (( n &lt; MAX )); <\u002Fspan><span style=\"color:#FF6FC8;\">do<\u002Fspan><\u002Fdiv>\n    <div style=\"padding-left:36px;color:#D8D8D8;\">n=$((n+1)); echo <span style=\"color:#9ED49E;\">\"=== sprint $n ===\"<\u002Fspan><\u002Fdiv>\n    <div style=\"padding-left:36px;\"><span style=\"color:#7FB0FF;\">claude<\u002Fspan><span style=\"color:#D8D8D8;\"> -p <\u002Fspan><span style=\"color:#9ED49E;\">\"$(cat prompt.md)\"<\u002Fspan><span style=\"color:#D8D8D8;\"> || { echo <\u002Fspan><span style=\"color:#9ED49E;\">\"session error\"<\u002Fspan><span style=\"color:#D8D8D8;\">; break; }<\u002Fspan><\u002Fdiv>\n    <div style=\"padding-left:36px;color:#6B6B6B;font-size:21px;\"># --dangerously-skip-permissions omitted for readability<\u002Fdiv>\n    <div style=\"padding-left:36px;color:#D8D8D8;\">grep -q <span style=\"color:#9ED49E;\">'^- \\[!\\]'<\u002Fspan> roadmap.md &amp;&amp; { echo <span style=\"color:#9ED49E;\">\"blocked\"<\u002Fspan>; break; }<\u002Fdiv>\n    <div><span style=\"color:#FF6FC8;\">done<\u002Fspan><\u002Fdiv>\n    <div style=\"color:#D8D8D8;\">echo <span style=\"color:#9ED49E;\">\"done — $n sprint(s)\"<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#6B6B6B;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>35<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<section data-label=\"Your Turn\" data-speaker-notes=\"Part 3: Your turn. Enough watching — now you run it yourself. Six files, one command, four sprints. Do it now in the room, or later at your desk; either way, here's the on-ramp.\" style=\"width:100%;height:100%;background:#F2F1EE;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:120px 140px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#6B6B6B;\">Part three<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 44px;\"><\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:800;font-size:150px;letter-spacing:-0.04em;line-height:0.92;\">Your turn<\u002Fh2>\n  <p style=\"margin:48px 0 0;max-width:1180px;font-size:34px;line-height:1.35;color:#6B6B6B;letter-spacing:-0.01em;\">Enough theory. Six files, one command, four sprints — here's how you run it yourself, now or later.<\u002Fp>\n  <div style=\"margin-top:30px;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.04em;color:#6B6B6B;\">What this answers — how to run the loop on your own machine.<\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>36<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Set Up\" data-speaker-notes=\"Step 1 — set up. Clone the repo, cd in, run setup.sh — that installs Playwright and Chromium and checks prereqs. Auth is either running claude once interactively or exporting your ANTHROPIC_API_KEY. The whole system is six files; here's the repo top to bottom, and the three things you do before the first run.\" style=\"width:100%;height:100%;background:#000000;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:64px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#6B6B6B;\">\n    <span>STEP 1 · SET UP<\u002Fspan><span>STEP 1 / 4<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:28px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:22px 0 0;font-weight:800;font-size:58px;letter-spacing:-0.035em;line-height:0.98;\">Clone it. Set up. Three minutes.<\u002Fh2>\n  <div style=\"margin-top:26px;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:24px 32px;font-family:'JetBrains Mono',monospace;font-size:21px;line-height:1.9;color:#D8D8D8;\">\n    <div style=\"white-space:pre;\"><span style=\"color:#5FCf8f;\">$<\u002Fspan> git clone github.com/rishidean/tutorials-agent-loop<\u002Fdiv>\n    <div style=\"white-space:pre;\"><span style=\"color:#5FCf8f;\">$<\u002Fspan> cd tutorials-agent-loop<\u002Fdiv>\n    <div style=\"white-space:pre;\"><span style=\"color:#5FCf8f;\">$<\u002Fspan> ./setup.sh<span style=\"color:#6B6B6B;\">          # Playwright + Chromium, prereq checks<\u002Fspan><\u002Fdiv>\n    <div style=\"white-space:pre;color:#6B6B6B;\"># auth: run `claude` once, or export ANTHROPIC_API_KEY<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.04fr 1fr;gap:56px;margin-top:26px;flex:1;min-height:0;\">\n    <div style=\"background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:26px 32px;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.18em;text-transform:uppercase;color:#6B6B6B;margin-bottom:16px;\">The repo, top to bottom<\u002Fdiv>\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.5;color:#D8D8D8;white-space:pre;\">your-service/\n├── <span style=\"color:#7FB0FF;\">CLAUDE.md<\u002Fspan>          <span style=\"color:#6B6B6B;\"># stack + \"done = run-qa GREEN\"<\u002Fspan>\n├── <span style=\"color:#7FB0FF;\">prompt.md<\u002Fspan>          <span style=\"color:#6B6B6B;\"># marching orders, every session<\u002Fspan>\n├── <span style=\"color:#7FB0FF;\">roadmap.md<\u002Fspan>         <span style=\"color:#6B6B6B;\"># the manifest / state machine<\u002Fspan>\n├── <span style=\"color:#7FB0FF;\">PROGRESS.md<\u002Fspan>        <span style=\"color:#6B6B6B;\"># handoff memory (starts empty)<\u002Fspan>\n├── <span style=\"color:#7FB0FF;\">run.sh<\u002Fspan>             <span style=\"color:#6B6B6B;\"># the orchestrator (~10 lines)<\u002Fspan>\n├── specs/\n│   └── <span style=\"color:#7FB0FF;\">sprint-1.md<\u002Fspan>    <span style=\"color:#6B6B6B;\"># one spec per sprint<\u002Fspan>\n└── .claude/\n    ├── skills/run-qa/<span style=\"color:#7FB0FF;\">SKILL.md<\u002Fspan>  <span style=\"color:#6B6B6B;\"># the run-qa gate<\u002Fspan>\n    └── agents/           <span style=\"color:#6B6B6B;\"># linter · reviewer · tester<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.18em;text-transform:uppercase;color:#6B6B6B;margin-bottom:18px;\">Three steps to your first run<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"display:flex;gap:18px;align-items:flex-start;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;color:#CF0090;font-weight:600;line-height:1.2;\">1<\u002Fspan>\n          <div style=\"font-size:24px;line-height:1.34;color:#E8E8E8;\">Drop a <span style=\"font-family:'JetBrains Mono',monospace;color:#fff;font-size:21px;\">CLAUDE.md<\u002Fspan> into one service — your stack, your conventions, and the one line: <span style=\"color:#FF6FC8;\">done = run-qa GREEN<\u002Fspan>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:18px;align-items:flex-start;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;color:#CF0090;font-weight:600;line-height:1.2;\">2<\u002Fspan>\n          <div style=\"font-size:24px;line-height:1.34;color:#E8E8E8;\">Write a single spec for that mind-numbing weekly task.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:18px;align-items:flex-start;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;color:#CF0090;font-weight:600;line-height:1.2;\">3<\u002Fspan>\n          <div style=\"font-size:24px;line-height:1.34;color:#E8E8E8;\"><span style=\"font-family:'JetBrains Mono',monospace;color:#fff;font-size:21px;\">./run.sh<\u002Fspan> — and watch it go.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto;border:1px solid #232323;background:#0E0E0E;border-radius:14px;padding:22px 26px;display:flex;align-items:center;gap:20px;\">\n        <span style=\"color:#CF0090;font-size:26px;line-height:1;\">→<\u002Fspan>\n        <div>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#6B6B6B;margin-bottom:7px;\">Clone the template<\u002Fdiv>\n          <a href=\"https://github.com/rishidean/tutorials-agent-loop\" style=\"font-family:'JetBrains Mono',monospace;font-size:22px;color:#fff;text-decoration:none;border-bottom:2px solid #CF0090;\">github.com/rishidean/tutorials-agent-loop<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#6B6B6B;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>37<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Run the Loop\" data-speaker-notes=\"Step 2 — run. One command. ./run.sh for an emergent run, or DEMO_MODE=planted ./run.sh for the guaranteed Sprint-3 RED-to-GREEN we just watched. A fresh session spins up for each sprint — builds the feature, runs the QA gate, ticks the roadmap, hands off. Then the next sprint starts with a clean brain. You write specs; the loop writes code.\" style=\"width:100%;height:100%;background:#000000;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:84px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#6B6B6B;\">\n    <span>STEP 2 · RUN<\u002Fspan><span>STEP 2 / 4<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:36px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:26px 0 0;font-weight:800;font-size:64px;letter-spacing:-0.04em;line-height:0.98;max-width:1400px;\">One command. The loop writes the code.<\u002Fh2>\n  <div style=\"margin-top:44px;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:34px 40px;font-family:'JetBrains Mono',monospace;font-size:26px;line-height:2.0;color:#D8D8D8;\">\n    <div style=\"white-space:pre;\"><span style=\"color:#5FCf8f;\">$<\u002Fspan> ./run.sh<span style=\"color:#6B6B6B;\">                      # emergent run<\u002Fspan><\u002Fdiv>\n    <div style=\"white-space:pre;\"><span style=\"color:#5FCf8f;\">$<\u002Fspan> DEMO_MODE=planted ./run.sh<span style=\"color:#6B6B6B;\">    # guaranteed Sprint-3 RED → GREEN<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"margin:44px 0 0;max-width:1480px;font-size:32px;line-height:1.42;color:#9A9A9A;letter-spacing:-0.005em;\">A fresh session spins up for each sprint — it builds the feature, runs the QA gate, ticks the roadmap, and hands off. Then the next sprint starts with a clean brain. <span style=\"color:#E8E8E8;\">You write specs; the loop writes code.<\u002Fspan><\u002Fp>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#6B6B6B;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>38<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Watch It Work\" data-speaker-notes=\"This is what a full run produces — no human at the keyboard. Four sprints build in sequence, QA gating every one. Sprint 3 is the payoff: QA catches a real bug (hiring a farmhand you can't afford sends the score negative), the verdict comes back RED, the Builder reads the failure, fixes it, and re-runs to GREEN — all on its own. Four sprints, four GREENs, zero keystrokes.\" style=\"width:100%;height:100%;background:#000000;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:84px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#6B6B6B;\">\n    <span>STEP 3 · WATCH<\u002Fspan><span>STEP 3 / 4<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:36px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:26px 0 0;font-weight:700;font-size:52px;letter-spacing:-0.03em;line-height:1.02;max-width:1500px;\">What one full run produces — no human at the keyboard.<\u002Fh2>\n  <div style=\"margin-top:30px;flex:1;min-height:0;display:grid;grid-template-columns:1.15fr 1fr;gap:40px;\">\n    <div style=\"background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:32px 40px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 24px 60px rgba(0,0,0,0.35);overflow:hidden;\">\n<div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.85;color:#D8D8D8;\">\n    <div style=\"white-space:pre;\"><span style=\"color:#5FCf8f;\">$<\u002Fspan> ./run.sh<\u002Fdiv>\n    <div style=\"white-space:pre;color:#9A9A9A;\">THE LOOP - starting...<\u002Fdiv>\n    <div style=\"white-space:pre;\">&nbsp;<\u002Fdiv>\n    <div style=\"white-space:pre;\"><span style=\"color:#CF0090;\">&gt;<\u002Fspan> Sprint 1   build -&gt; run-qa -&gt; <span style=\"color:#5FCf8f;\">GREEN<\u002Fspan><\u002Fdiv>\n    <div style=\"white-space:pre;\"><span style=\"color:#CF0090;\">&gt;<\u002Fspan> Sprint 2   build -&gt; run-qa -&gt; <span style=\"color:#5FCf8f;\">GREEN<\u002Fspan><\u002Fdiv>\n    <div style=\"white-space:pre;\"><span style=\"color:#CF0090;\">&gt;<\u002Fspan> Sprint 3   build -&gt; run-qa -&gt; <span style=\"color:#FF6FC8;font-weight:600;\">RED<\u002Fspan><\u002Fdiv>\n    <div style=\"white-space:pre;color:#FF6FC8;\">              hiring a farmhand you can't afford sends score negative<\u002Fdiv>\n    <div style=\"white-space:pre;\">              fix #1 -&gt; run-qa -&gt; <span style=\"color:#5FCf8f;\">GREEN<\u002Fspan><\u002Fdiv>\n    <div style=\"white-space:pre;\"><span style=\"color:#CF0090;\">&gt;<\u002Fspan> Sprint 4   build -&gt; run-qa -&gt; <span style=\"color:#5FCf8f;\">GREEN<\u002Fspan><\u002Fdiv>\n    <div style=\"white-space:pre;\">&nbsp;<\u002Fdiv>\n    <div style=\"white-space:pre;\"><span style=\"color:#5FCf8f;\">ALL SPRINTS COMPLETE - 4 / 4 GREEN<\u002Fspan>  -  0 keystrokes<\u002Fdiv>\n  <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;min-height:0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.18em;text-transform:uppercase;color:#6B6B6B;margin-bottom:12px;\">The run, recorded · Sprint 3 RED → GREEN<\u002Fdiv>\n      <image-slot id=\"watch-run-gif\" style=\"flex:1;min-height:0;\" shape=\"rounded\" radius=\"14\" fit=\"contain\" placeholder=\"Drop the run recording (GIF / MP4 frame) — Sprint 3 RED → GREEN\"><\u002Fimage-slot>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#6B6B6B;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>39<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Play It\" data-speaker-notes=\"Step 4 — play. Open index.html, or reference/index.html for the finished build. This is the thing the loop made — and you didn't write a line of it. Click to harvest, hire farmhands, watch idle income roll in. Four sprints, zero keystrokes from you.\" style=\"width:100%;height:100%;background:#000000;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:64px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#6B6B6B;\">\n    <span>STEP 4 · PLAY<\u002Fspan><span>STEP 4 / 4<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:28px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:22px 0 0;font-weight:800;font-size:60px;letter-spacing:-0.04em;line-height:0.98;\">You didn't write a line of it.<\u002Fh2>\n  <div style=\"margin-top:22px;align-self:flex-start;font-family:'JetBrains Mono',monospace;font-size:22px;color:#D8D8D8;white-space:pre;background:#0E0E0E;border:1px solid #232323;border-radius:12px;padding:18px 26px;\"><span style=\"color:#5FCf8f;\">$<\u002Fspan> open index.html<span style=\"color:#6B6B6B;\">        # or reference/index.html for the finished build<\u002Fspan><\u002Fdiv>\n  <div style=\"margin-top:16px;\"><a href=\"https://rishidean.github.io/tutorials-agent-loop/\" style=\"font-family:'JetBrains Mono',monospace;font-size:22px;color:#CF0090;text-decoration:none;border-bottom:2px solid rgba(207,0,144,0.42);\">Play the live build&nbsp;&nbsp;→<\u002Fa><\u002Fdiv>\n  <div style=\"flex:1;min-height:0;margin-top:26px;display:flex;\">\n    <image-slot id=\"clickfarm-build\" style=\"flex:1;height:100%;\" shape=\"rounded\" radius=\"16\" fit=\"contain\" placeholder=\"Drop a Click Farm screenshot or GIF — reference/index.html\"><\u002Fimage-slot>\n  <\u002Fdiv>\n  <p style=\"margin:22px 0 0;max-width:1480px;font-size:28px;line-height:1.4;color:#9A9A9A;letter-spacing:-0.005em;\">Click to harvest. Hire farmhands. Watch idle income roll in. <span style=\"color:#E8E8E8;\">Four sprints, zero keystrokes from you.<\u002Fspan><\u002Fp>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;disp rt four<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 44px;\"><\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:800;font-size:150px;letter-spacing:-0.04em;line-height:0.92;\">Looking ahead<\u002Fh2>\n  <p style=\"margin:48px 0 0;max-width:980px;font-size:34px;line-height:1.35;color:#6B6B6B;letter-spacing:-0.01em;\">What being airborne means for you, the team, and the org — and the single ask that starts it.<\u002Fp>\n  <div style=\"margin-top:30px;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.04em;color:#9A9A9A;\">What this answers — what airborne means next, and the one ask.<\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>43<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Path Forward\" data-speaker-notes=\"Here's how this spreads. You, now: ship features using the loop on your own service. The team, next: the loop becomes the default, specs become the interface between roles. The org, eventually: headcount models change, the company operates differently. It starts with one person proving it works.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>WHAT'S NEXT<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:28px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;\">How it spreads from here.<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:22px;margin-top:64px;\">\n    <sc-for list=\"{{ pathRows }}\" as=\"p\" hint-placeholder-count=\"3\">\n      <div style=\"display:grid;grid-template-columns:320px 1fr;align-items:center;gap:48px;border:1.5px solid {{ p.accent }};background:{{ p.bg }};border-radius:14px;padding:34px 44px;\">\n        <div>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:{{ p.tagColor }};margin-bottom:10px;\">{{ p.who }}<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:38px;letter-spacing:-0.02em;color:{{ p.nameColor }};\">{{ p.stage }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:30px;line-height:1.35;color:#4A4A4A;letter-spacing:-0.01em;\">{{ p.text }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>44<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"You're Airborne\" data-speaker-notes=\"The gap between Driving and Helicopter isn't talent — it's method. This is what the method looks like once it's running.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:92px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>WHAT AIRBORNE LOOKS LIKE<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:44px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:30px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;max-width:1320px;\">The secret is that there is no secret. It's just putting in the work.&nbsp;<\u002Fh2>\n  <div style=\"position:absolute;left:120px;right:120px;top:392px;\">\n    <div style=\"display:grid;grid-template-columns:repeat(6,1fr);\">\n      <sc-for list=\"{{ stationsHeli }}\" as=\"s\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 12px;\">\n          <div style=\"height:22px;font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:0.18em;text-transform:uppercase;color:#CF0090;margin-bottom:10px;white-space:nowrap;\">{{ s.markerText }}<\u002Fdiv>\n          <div style=\"height:58px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;\">{{ s.icon }}<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;color:{{ s.kicker }};margin-bottom:10px;\">{{ s.num }}<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:29px;letter-spacing:-0.02em;color:{{ s.nameColor }};\">{{ s.name }}<\u002Fdiv>\n          <div style=\"position:relative;width:100%;height:52px;display:flex;align-items:center;justify-content:center;\">\n            <div style=\"position:absolute;left:0;right:0;top:50%;height:2px;background:{{ s.railColor }};transform:translateY(-50%);\"><\u002Fdiv>\n            <div style=\"position:relative;width:{{ s.dot }};height:{{ s.dot }};border-radius:50%;background:{{ s.dotBg }};border:3px solid {{ s.dotBorder }};box-shadow:{{ s.dotShadow }};\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:20px;line-height:1.3;color:#6B6B6B;margin-top:8px;max-width:230px;\">{{ s.desc }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute;left:120px;right:120px;top:698px;\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid #E6E6E6;\">\n      <div style=\"padding:26px 56px 4px 0;border-right:1px solid #E6E6E6;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.22em;text-transform:uppercase;color:#B5B5B5;margin-bottom:18px;\">Driving — the old way<\u002Fdiv>\n        <sc-for list=\"{{ changedFrom }}\" as=\"row\" hint-placeholder-count=\"5\">\n          <div style=\"font-size:22px;line-height:1.25;color:#6B6B6B;letter-spacing:-0.01em;padding:8px 0;border-bottom:1px solid #EFEFEF;\">{{ row }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"padding:26px 0 4px 56px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.22em;text-transform:uppercase;color:#CF0090;margin-bottom:18px;\">Helicopter — what the loop does<\u002Fdiv>\n        <sc-for list=\"{{ changedTo }}\" as=\"row\" hint-placeholder-count=\"5\">\n          <div style=\"font-size:22px;line-height:1.25;color:#0A0A0A;font-weight:600;letter-spacing:-0.01em;padding:8px 0;border-bottom:1px solid #EFEFEF;\">{{ row }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>45<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The Acceleration\" data-speaker-notes=\"Notice the compression. Each transition took less time than the last. The people who get airborne now have a compounding advantage — every week at Helicopter makes the next week more productive. The gap between Driving and Helicopter isn't closing. It's widening.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE ACCELERATION<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:28px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;max-width:1300px;\">Each shift arrives faster than the last.<\u002Fh2>\n  <div style=\"margin-top:104px;height:128px;display:flex;align-items:center;\">\n    <div style=\"flex:1;display:flex;align-items:center;padding:0 60px;\">\n      <div style=\"position:relative;flex:0 0 0;display:flex;justify-content:center;\">\n        <div style=\"width:18px;height:18px;border-radius:50%;background:#B5B5B5;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:50%;transform:translateX(-50%);bottom:30px;white-space:nowrap;font-weight:700;font-size:25px;letter-spacing:-0.02em;color:#0A0A0A;\">Walking<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:5;height:4px;background:#DADADA;border-radius:2px;position:relative;\">\n        <div style=\"position:absolute;left:50%;transform:translateX(-50%);top:20px;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:21px;letter-spacing:0.02em;color:#9A9A9A;\">~ years<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;flex:0 0 0;display:flex;justify-content:center;\">\n        <div style=\"width:18px;height:18px;border-radius:50%;background:#B5B5B5;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:50%;transform:translateX(-50%);bottom:30px;white-space:nowrap;font-weight:700;font-size:25px;letter-spacing:-0.02em;color:#0A0A0A;\">Biking<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:3;height:4px;background:#CFCFCF;border-radius:2px;position:relative;\">\n        <div style=\"position:absolute;left:50%;transform:translateX(-50%);top:20px;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:21px;letter-spacing:0.02em;color:#9A9A9A;\">~ a year<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;flex:0 0 0;display:flex;justify-content:center;\">\n        <div style=\"width:18px;height:18px;border-radius:50%;background:#B5B5B5;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:50%;transform:translateX(-50%);bottom:30px;white-space:nowrap;font-weight:700;font-size:25px;letter-spacing:-0.02em;color:#0A0A0A;\">Driving<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1.6;height:4px;background:#E59ACB;border-radius:2px;position:relative;\">\n        <div style=\"position:absolute;left:50%;transform:translateX(-50%);top:20px;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:21px;letter-spacing:0.02em;color:#B65BA0;\">months<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;flex:0 0 0;display:flex;justify-content:center;\">\n        <div style=\"width:18px;height:18px;border-radius:50%;background:#CF0090;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:50%;transform:translateX(-50%);bottom:30px;white-space:nowrap;font-weight:700;font-size:25px;letter-spacing:-0.02em;color:#CF0090;\">Helicopter<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:0.8;height:5px;background:#CF0090;border-radius:2px;position:relative;\">\n        <div style=\"position:absolute;left:50%;transform:translateX(-50%);top:20px;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:600;letter-spacing:0.02em;color:#CF0090;\">now<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;flex:0 0 0;display:flex;justify-content:center;\">\n        <div style=\"width:26px;height:26px;border-radius:50%;background:#CF0090;box-shadow:0 0 0 8px rgba(207,0,144,0.14);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:50%;transform:translateX(-50%);bottom:34px;white-space:nowrap;font-weight:700;font-size:25px;letter-spacing:-0.02em;color:#CF0090;\">Jet<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:30px;border-top:1px solid #E6E6E6;padding-top:22px;font-size:28px;color:#6B6B6B;letter-spacing:-0.01em;\">The advantage compounds. The gap between Driving and Helicopter isn't closing — <span style=\"color:#CF0090;font-weight:600;\">it's widening.<\u002Fspan><\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>46<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"One Ask\" data-speaker-notes=\"One ask, 90 days: every service gets broad context (CLAUDE.md) and a quality gate (run-qa). Once those exist, the loop becomes possible — and once the loop is possible, you're airborne. Your first spec is the dumbest repetitive task you do every week. Write it this week. Run the loop on it.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:96px 140px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">MY REQUEST OF YOU<\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:36px;margin:52px 0 0;\">\n    <div style=\"font-weight:800;font-size:240px;letter-spacing:-0.05em;line-height:0.82;color:#CF0090;\">90<\u002Fdiv>\n    <div style=\"font-weight:800;font-size:96px;letter-spacing:-0.04em;line-height:0.9;\">days.<\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"margin:56px 0 0;max-width:1240px;font-weight:700;font-size:52px;line-height:1.18;letter-spacing:-0.02em;\">Every service gets a <span style=\"font-family:'JetBrains Mono',monospace;font-size:42px;background:#141414;color:#fff;padding:6px 16px;border-radius:8px;\">CLAUDE.md<\u002Fspan> and a <span style=\"font-family:'JetBrains Mono',monospace;font-size:42px;background:#141414;color:#fff;padding:6px 16px;border-radius:8px;\">run-qa<\u002Fspan> skill.<\u002Fp>\n  <p style=\"margin:40px 0 0;max-width:1100px;font-size:32px;line-height:1.4;color:#6B6B6B;letter-spacing:-0.01em;\">Pick the most mundane, repetitive task you do every week. That's your first candidate to automate.&nbsp;<\u002Fp>\n  <div style=\"margin-top:48px;display:flex;flex-wrap:wrap;align-items:center;gap:14px 26px;border-top:1px solid #E6E6E6;padding-top:30px;font-family:'JetBrains Mono',monospace;font-size:21px;letter-spacing:0.01em;\">\n    <span style=\"color:#9A9A9A;text-transform:uppercase;letter-spacing:0.16em;font-size:17px;\">Where to start<\u002Fspan>\n    <a href=\"https://github.com/rishidean/tutorials-agent-loop\" style=\"color:#CF0090;text-decoration:none;border-bottom:2px solid rgba(207,0,144,0.32);\">github.com/rishidean/tutorials-agent-loop<\u002Fa>\n    \n    \n    \n    \n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>47<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Appendices\" data-speaker-notes=\"\" style=\"width:100%;height:100%;background:radial-gradient(circle at 7% 93%, rgba(207,0,144,0.20) 0%, rgba(207,0,144,0) 56%), #0A0A0A;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:120px 140px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#9A9A9A;\">TECH REFERENCES<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 44px;\"><\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:800;font-size:150px;letter-spacing:-0.04em;line-height:0.92;\">Appendices<\u002Fh2>\n  <p style=\"margin:40px 0 0;max-width:1120px;font-size:32px;line-height:1.35;color:#9A9A9A;letter-spacing:-0.01em;\">Optional reference, for those implementing.&nbsp;<\u002Fp>\n  \n  \n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>48<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n<section data-label=\"Why It Works\" data-speaker-notes=\"Appendix, the theory layer. Five ideas sit under the loop. Each one is optional reading and resolves to a file you already ran — nothing here is new machinery, just the why behind what you saw.\" style=\"width:100%;height:100%;background:radial-gradient(circle at 7% 93%, rgba(207,0,144,0.20) 0%, rgba(207,0,144,0) 56%), #0A0A0A;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:120px 140px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#9A9A9A;\">Appendix · The theory<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 44px;\"><\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:800;font-size:150px;letter-spacing:-0.04em;line-height:0.92;\">Why it works<\u002Fh2>\n  <p style=\"margin:44px 0 0;max-width:1240px;font-size:32px;line-height:1.35;color:#9A9A9A;letter-spacing:-0.01em;\">Five ideas under the loop — optional reading. Every one resolves to a file you already ran.<\u002Fp>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>49<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Skill = Process\" data-speaker-notes=\"A skill file holds a procedure, not facts — how to do a recurring job: run the three checks, return one verdict. The method becomes reusable and versioned, kept separate from any single task it runs on. — that’s the skill.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:92px 130px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Why it works<\u002Fspan><span>01 / 05<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:32px 0 0;font-weight:700;font-size:58px;letter-spacing:-0.03em;line-height:1.0;max-width:1480px;\">A skill stores a <span style=\"color:#CF0090;\">process<\u002Fspan>, not content.<\u002Fh2>\n  <p style=\"margin:34px 0 0;max-width:1480px;font-size:34px;line-height:1.4;color:#6B6B6B;letter-spacing:-0.01em;\">A skill file holds a procedure, not facts — how to do a recurring job: run the three checks, return one verdict. The method becomes reusable and versioned, kept separate from any single task it runs on.<\u002Fp>\n  <div style=\"margin-top:auto;border-top:1px solid #E6E6E6;padding-top:30px;display:flex;align-items:center;gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">that’s the skill<\u002Fspan>\n    <span style=\"color:#CF0090;font-size:26px;line-height:1;\">→<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:-0.005em;color:#0A0A0A;background:#F2F1EE;border:1px solid #E6E6E6;border-radius:10px;padding:11px 18px;\">SKILL.md / run-qa<\u002Fspan>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>50<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Subagents = Clean Context\" data-speaker-notes=\"Each subagent gets its own context window and exactly one narrow job. The reviewer never sees the builder’s scratch work; the tester starts fresh. Narrow scope means a cheaper model and no cross-contamination. — that’s the QA crew.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:92px 130px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Why it works<\u002Fspan><span>02 / 05<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:32px 0 0;font-weight:700;font-size:58px;letter-spacing:-0.03em;line-height:1.0;max-width:1480px;\">Subagents keep <span style=\"color:#CF0090;\">context clean<\u002Fspan>.<\u002Fh2>\n  <p style=\"margin:34px 0 0;max-width:1480px;font-size:34px;line-height:1.4;color:#6B6B6B;letter-spacing:-0.01em;\">Each subagent gets its own context window and exactly one narrow job. The reviewer never sees the builder’s scratch work; the tester starts fresh. Narrow scope means a cheaper model and no cross-contamination.<\u002Fp>\n  <div style=\"margin-top:auto;border-top:1px solid #E6E6E6;padding-top:30px;display:flex;align-items:center;gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">that’s the QA crew<\u002Fspan>\n    <span style=\"color:#CF0090;font-size:26px;line-height:1;\">→<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:-0.005em;color:#0A0A0A;background:#F2F1EE;border:1px solid #E6E6E6;border-radius:10px;padding:11px 18px;\">linter · reviewer · tester<\u002Fspan>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>51<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Fresh Sessions\" data-speaker-notes=\"A model’s context is finite and degrades as it fills. So every sprint launches a new session with an empty window — the roadmap and PROGRESS files carry state forward, not the model’s fading memory. — that’s the clean brain per sprint.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:92px 130px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Why it works<\u002Fspan><span>03 / 05<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:32px 0 0;font-weight:700;font-size:58px;letter-spacing:-0.03em;line-height:1.0;max-width:1480px;\">Fresh sessions beat <span style=\"color:#CF0090;\">a full context<\u002Fspan>.<\u002Fh2>\n  <p style=\"margin:34px 0 0;max-width:1480px;font-size:34px;line-height:1.4;color:#6B6B6B;letter-spacing:-0.01em;\">A model’s context is finite and degrades as it fills. So every sprint launches a new session with an empty window — the roadmap and PROGRESS files carry state forward, not the model’s fading memory.<\u002Fp>\n  <div style=\"margin-top:auto;border-top:1px solid #E6E6E6;padding-top:30px;display:flex;align-items:center;gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">that’s the clean brain per sprint<\u002Fspan>\n    <span style=\"color:#CF0090;font-size:26px;line-height:1;\">→<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:-0.005em;color:#0A0A0A;background:#F2F1EE;border:1px solid #E6E6E6;border-radius:10px;padding:11px 18px;\">roadmap.md + PROGRESS.md<\u002Fspan>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>52<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Self-Improvement\" data-speaker-notes=\"When a session learns something durable — a gotcha, a convention — it writes it back into the broad context. The next session starts smarter. The system quietly edits its own instructions. — that’s the Document step.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:92px 130px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Why it works<\u002Fspan><span>04 / 05<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:32px 0 0;font-weight:700;font-size:58px;letter-spacing:-0.03em;line-height:1.0;max-width:1480px;\">The loop <span style=\"color:#CF0090;\">improves itself<\u002Fspan>.<\u002Fh2>\n  <p style=\"margin:34px 0 0;max-width:1480px;font-size:34px;line-height:1.4;color:#6B6B6B;letter-spacing:-0.01em;\">When a session learns something durable — a gotcha, a convention — it writes it back into the broad context. The next session starts smarter. The system quietly edits its own instructions.<\u002Fp>\n  <div style=\"margin-top:auto;border-top:1px solid #E6E6E6;padding-top:30px;display:flex;align-items:center;gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">that’s the Document step<\u002Fspan>\n    <span style=\"color:#CF0090;font-size:26px;line-height:1;\">→<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:-0.005em;color:#0A0A0A;background:#F2F1EE;border:1px solid #E6E6E6;border-radius:10px;padding:11px 18px;\">promotes → CLAUDE.md<\u002Fspan>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>53<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Latent vs Deterministic\" data-speaker-notes=\"Generation is fuzzy by nature — synthesis, design, judgment. Verification isn’t: the assertion passes or it doesn’t. You never trust the model’s opinion of its own work; you run a tool that returns a fact. — that’s why QA is a test.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:92px 130px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Why it works<\u002Fspan><span>05 / 05<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:32px 0 0;font-weight:700;font-size:58px;letter-spacing:-0.03em;line-height:1.0;max-width:1480px;\">Generate is latent. <span style=\"color:#CF0090;\">Verify is deterministic.<\u002Fspan><\u002Fh2>\n  <p style=\"margin:34px 0 0;max-width:1480px;font-size:34px;line-height:1.4;color:#6B6B6B;letter-spacing:-0.01em;\">Generation is fuzzy by nature — synthesis, design, judgment. Verification isn’t: the assertion passes or it doesn’t. You never trust the model’s opinion of its own work; you run a tool that returns a fact.<\u002Fp>\n  <div style=\"margin-top:auto;border-top:1px solid #E6E6E6;padding-top:30px;display:flex;align-items:center;gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">that’s why QA is a test<\u002Fspan>\n    <span style=\"color:#CF0090;font-size:26px;line-height:1;\">→<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:-0.005em;color:#0A0A0A;background:#F2F1EE;border:1px solid #E6E6E6;border-radius:10px;padding:11px 18px;\">a test, not a vibe check<\u002Fspan>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>54<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Extending This Model\" data-speaker-notes=\"Appendix, going further. The four moves from the teaser, now in full. This is the detail moved out of the hands-on flow so the run-it momentum isn't interrupted. From a solo Helicopter to a team's Jet to an org's Rocket.\" style=\"width:100%;height:100%;background:radial-gradient(circle at 7% 93%, rgba(207,0,144,0.20) 0%, rgba(207,0,144,0) 56%), #0A0A0A;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:120px 140px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#9A9A9A;\">Appendix · Going further<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 44px;\"><\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:800;font-size:124px;letter-spacing:-0.04em;line-height:0.94;\">Extending this model<\u002Fh2>\n  <p style=\"margin:44px 0 0;max-width:1240px;font-size:32px;line-height:1.35;color:#9A9A9A;letter-spacing:-0.01em;\">The four moves in full — same shape every time, one small file in <span style=\"font-family:'JetBrains Mono',monospace;font-size:28px;color:#0A0A0A;\">.claude/<\u002Fspan>.<\u002Fp>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>55<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"The Four Moves\" data-speaker-notes=\"The four moves in full. Encode judgment: the loop writes its own roadmap and specs. Add a gate: raise the bar on what GREEN means. Add structure: scale breadth with epics and parallel builders. Close the loop: make it durable and auditable. Helicopter to Jet to Rocket.\" style=\"width:100%;height:100%;background:#000000;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:64px 110px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#6B6B6B;\">\n    <span>Appendix · Going further<\u002Fspan><span>The four moves<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:28px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:22px 0 0;font-weight:800;font-size:52px;letter-spacing:-0.035em;line-height:0.98;\">Same shape, four directions.<\u002Fh2>\n  <div style=\"flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:26px;margin-top:30px;\">\n    <div style=\"border:1px solid #232323;border-radius:14px;background:#0E0E0E;padding:30px 32px;display:flex;flex-direction:column;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;margin-bottom:10px;\">Encode judgment<\u002Fdiv>\n    <div style=\"font-size:25px;line-height:1.2;color:#E8E8E8;font-weight:600;letter-spacing:-0.01em;margin-bottom:22px;\">the loop writes its own inputs<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:13px;font-family:'JetBrains Mono',monospace;font-size:21px;color:#9A9A9A;letter-spacing:-0.005em;\"><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>generate-roadmap<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>spec-sprint<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>plan-sprint &nbsp;<span style=\"color:#5A5A5A;\">plan before build<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n    <div style=\"border:1px solid #232323;border-radius:14px;background:#0E0E0E;padding:30px 32px;display:flex;flex-direction:column;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;margin-bottom:10px;\">Add a gate<\u002Fdiv>\n    <div style=\"font-size:25px;line-height:1.2;color:#E8E8E8;font-weight:600;letter-spacing:-0.01em;margin-bottom:22px;\">raise the bar on GREEN<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:13px;font-family:'JetBrains Mono',monospace;font-size:21px;color:#9A9A9A;letter-spacing:-0.005em;\"><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>security / a11y / perf<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>planning approval<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>PR-per-sprint + CI<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n    <div style=\"border:1px solid #232323;border-radius:14px;background:#0E0E0E;padding:30px 32px;display:flex;flex-direction:column;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;margin-bottom:10px;\">Add structure<\u002Fdiv>\n    <div style=\"font-size:25px;line-height:1.2;color:#E8E8E8;font-weight:600;letter-spacing:-0.01em;margin-bottom:22px;\">scale breadth<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:13px;font-family:'JetBrains Mono',monospace;font-size:21px;color:#9A9A9A;letter-spacing:-0.005em;\"><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>epics → sprints → features<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>parallel builders<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>multi-repo<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n    <div style=\"border:1px solid #232323;border-radius:14px;background:#0E0E0E;padding:30px 32px;display:flex;flex-direction:column;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;margin-bottom:10px;\">Close the loop<\u002Fdiv>\n    <div style=\"font-size:25px;line-height:1.2;color:#E8E8E8;font-weight:600;letter-spacing:-0.01em;margin-bottom:22px;\">durable &amp; auditable<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:13px;font-family:'JetBrains Mono',monospace;font-size:21px;color:#9A9A9A;letter-spacing:-0.005em;\"><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>session-start / wrapup<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>structured logs + cost<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"color:#CF0090;\">·<\u002Fspan><span>knowledge base<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:24px;padding-top:20px;border-top:1px solid #1F1F1F;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:19px;letter-spacing:0.03em;color:#B5B5B5;\">\n    <span><span style=\"color:#E8E8E8;\">Helicopter<\u002Fspan> <span style=\"color:#6B6B6B;\">(this repo)<\u002Fspan> <span style=\"color:#3A3A3A;\">→<\u002Fspan> <span style=\"color:#E8E8E8;\">Jet<\u002Fspan> <span style=\"color:#6B6B6B;\">(a team)<\u002Fspan> <span style=\"color:#3A3A3A;\">→<\u002Fspan> <span style=\"color:#E8E8E8;\">Rocket<\u002Fspan> <span style=\"color:#6B6B6B;\">(an org)<\u002Fspan><\u002Fspan>\n    <span style=\"color:#6B6B6B;\">full catalog <span style=\"color:#CF0090;\">→<\u002Fspan> <span style=\"color:#D8D8D8;\">EXTENDING.md<\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#6B6B6B;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>56<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Add a PLAN Phase\" data-speaker-notes=\"Lead example of Encode judgment, in depth. A plan phase can live in two places. Post-spec: before the Builder writes code on a non-trivial sprint, it plans first — files, order, risks — into plan.md, and a gate approves it before any code is written; cheap insurance that catches a bad approach before a full build-QA cycle. Pre-spec, going further: the model writes the roadmap and specs from intent, and you approve those instead of authoring them. The artifact for post-spec is a new per-sprint plan.md — intent, not memory, so it earns its own slot next to state, memory, and learning. The deeper point: judgment moves up a rung. That's the Jet step on the spine.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:64px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · Going further<\u002Fspan><span>Encode judgment · in depth<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:22px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:20px 0 0;font-weight:700;font-size:52px;letter-spacing:-0.03em;line-height:1.0;\">Add a PLAN phase.<\u002Fh2>\n  <p style=\"margin:12px 0 0;font-size:26px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">Plan before you build — and, going further,
