ace-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>19<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The Double Loop\" data-speaker-notes=\"Here's the full topology. One loop inside another. The outer loop marches through sprints — fresh brain each time. The inner loop is one session: build, QA, document. If QA is RED, fix and re-check. If GREEN, tick the manifest, write a handoff note, and the outer loop moves on. Three verbs: build, verify, document.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE TOPOLOGY<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:28px 0 0;font-weight:700;font-size:54px;letter-spacing:-0.03em;line-height:1.0;\">One loop inside another.<\u002Fh2>\n  <p style=\"margin:16px 0 0;max-width:1560px;font-size:27px;line-height:1.32;color:#6B6B6B;letter-spacing:-0.01em;\">The outer loop marches through sprints with a fresh brain each time. The inner loop is one session: build → verify → document.<\u002Fp>\n  <div style=\"margin-top:14px;display:flex;align-items:center;gap:20px;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.02em;\">\n    <span style=\"display:inline-flex;align-items:center;gap:9px;\"><span style=\"width:13px;height:13px;border-radius:50%;background:#1F8A4C;\"><\u002Fspan><span style=\"color:#0A0A0A;\">GREEN = passed, ship it<\u002Fspan><\u002Fspan>\n    <span style=\"color:#C4C4C4;\">·<\u002Fspan>\n    <span style=\"display:inline-flex;align-items:center;gap:9px;\"><span style=\"width:13px;height:13px;border-radius:50%;background:#CF0090;\"><\u002Fspan><span style=\"color:#0A0A0A;\">RED = failed, fix &amp; re-run (max 3)<\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- OUTER LOOP -->\n  <div style=\"margin-top:48px;border:1.5px solid #DADADA;border-radius:18px;padding:30px 36px 40px;position:relative;flex:1;display:flex;flex-direction:column;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:#9A9A9A;margin-bottom:24px;\">Outer loop · run.sh — marches through sprints, fresh brain each turn<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:30px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:21px;color:#0A0A0A;border:1px solid #DADADA;border-radius:9px;padding:12px 20px;background:#fff;\">Sprint 1<\u002Fdiv>\n      <span style=\"color:#C4C4C4;font-size:24px;\">→<\u002Fspan>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:21px;color:#0A0A0A;border:1px solid #DADADA;border-radius:9px;padding:12px 20px;background:#fff;\">Sprint 2<\u002Fdiv>\n      <span style=\"color:#C4C4C4;font-size:24px;\">→<\u002Fspan>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:21px;color:#0A0A0A;border:1px solid #DADADA;border-radius:9px;padding:12px 20px;background:#fff;\">Sprint 3<\u002Fdiv>\n      <span style=\"color:#C4C4C4;font-size:24px;\">→<\u002Fspan>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:21px;color:#9A9A9A;border:1px dashed #C4C4C4;border-radius:9px;padding:12px 20px;\">…until done<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- INNER LOOP -->\n    <div style=\"border:2px solid #CF0090;border-radius:16px;padding:32px 40px 38px;background:#FFF5FB;position:relative;flex:1;display:flex;flex-direction:column;justify-content:center;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:30px;\">Inner loop · one session<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:20px;\">\n        <div style=\"flex:1;text-align:center;background:#fff;border:1.5px solid #F0C6E2;border-radius:12px;padding:26px 16px;\">\n          <div style=\"font-weight:700;font-size:34px;letter-spacing:-0.02em;\">Build<\u002Fdiv>\n          <div style=\"font-size:21px;color:#6B6B6B;margin-top:8px;\">the feature<\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"color:#CF0090;font-size:30px;font-weight:600;\">→<\u002Fspan>\n        <div style=\"flex:1;text-align:center;background:#fff;border:1.5px solid #F0C6E2;border-radius:12px;padding:26px 16px;\">\n          <div style=\"font-weight:700;font-size:34px;letter-spacing:-0.02em;\">Verify<\u002Fdiv>\n          <div style=\"font-size:21px;color:#6B6B6B;margin-top:8px;\">QA crew → GREEN / RED<\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"color:#CF0090;font-size:30px;font-weight:600;\">→<\u002Fspan>\n        <div style=\"flex:1;text-align:center;background:#fff;border:1.5px solid #F0C6E2;border-radius:12px;padding:26px 16px;\">\n          <div style=\"font-weight:700;font-size:34px;letter-spacing:-0.02em;\">Document<\u002Fdiv>\n          <div style=\"font-size:21px;color:#6B6B6B;margin-top:8px;\">tick manifest, handoff<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:22px;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.04em;color:#CF0090;text-align:center;\">↺&nbsp;&nbsp;RED → fix → re-verify &nbsp;(max 3 attempts, then stop)<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>20<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The Loop, By File\" data-speaker-notes=\"Same loop — now made concrete. The outer loop IS run.sh, walking the roadmap.md manifest, launching a fresh session each turn that reads prompt.md. Inside, the Builder reads CLAUDE.md and the sprint spec to build, calls the run-qa skill — which runs linter, code-reviewer, and playwright-tester — to verify, then ticks roadmap.md and appends to PROGRESS.md to document. Every box on the conceptual loop is a real file in the repo.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:80px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE TOPOLOGY · BY FILE<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:32px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:24px 0 0;font-weight:700;font-size:48px;letter-spacing:-0.03em;line-height:1.0;\">How the loop is built in practice.<\u002Fh2>\n  <p style=\"margin:10px 0 0;font-size:24px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">Same loop as the previous slide — now wired to the real filenames.<\u002Fp>\n\n  <!-- OUTER LOOP -->\n  <div style=\"margin-top:34px;border:1.5px solid #DADADA;border-radius:18px;padding:26px 32px 34px;position:relative;flex:1;display:flex;flex-direction:column;\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:#9A9A9A;\">Outer loop · marches through sprints, fresh brain each turn<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;color:#fff;background:#141414;border:1px solid #141414;border-radius:7px;padding:7px 11px;\">[script] run.sh<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;color:#0A0A0A;background:#fff;border:1px solid #DADADA;border-radius:7px;padding:7px 11px;\">roadmap.md → the manifest<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;color:#0A0A0A;background:#fff;border:1px solid #DADADA;border-radius:7px;padding:7px 11px;\">prompt.md → read each turn<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:24px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:19px;color:#0A0A0A;border:1px solid #DADADA;border-radius:9px;padding:10px 18px;background:#fff;\">Sprint 1<\u002Fdiv>\n      <span style=\"color:#C4C4C4;font-size:22px;\">→<\u002Fspan>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:19px;color:#0A0A0A;border:1px solid #DADADA;border-radius:9px;padding:10px 18px;background:#fff;\">Sprint 2<\u002Fdiv>\n      <span style=\"color:#C4C4C4;font-size:22px;\">→<\u002Fspan>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:19px;color:#0A0A0A;border:1px solid #DADADA;border-radius:9px;padding:10px 18px;background:#fff;\">Sprint 3<\u002Fdiv>\n      <span style=\"color:#C4C4C4;font-size:22px;\">→<\u002Fspan>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:19px;color:#9A9A9A;border:1px dashed #C4C4C4;border-radius:9px;padding:10px 18px;\">…until done<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- INNER LOOP -->\n    <div style=\"border:2px solid #CF0090;border-radius:16px;padding:24px 34px 30px;background:#FFF5FB;position:relative;flex:1;display:flex;flex-direction:column;justify-content:center;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;\">Inner loop · one session<\u002Fdiv>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;color:#6B6B6B;background:#fff;border:1px solid #F0C6E2;border-radius:7px;padding:7px 11px;\">the Builder → a fresh Claude Code session<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:stretch;justify-content:space-between;gap:18px;\">\n        <div style=\"flex:1;background:#fff;border:1.5px solid #F0C6E2;border-radius:12px;padding:22px 18px;display:flex;flex-direction:column;align-items:center;text-align:center;\">\n          <div style=\"font-weight:700;font-size:30px;letter-spacing:-0.02em;\">Build<\u002Fdiv>\n          <div style=\"font-size:18px;color:#6B6B6B;margin:6px 0 16px;\">the feature<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;width:100%;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;color:#0A0A0A;background:#FAFAFA;border:1px solid #DADADA;border-radius:7px;padding:7px 10px;\">CLAUDE.md<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;color:#0A0A0A;background:#FAFAFA;border:1px solid #DADADA;border-radius:7px;padding:7px 10px;\">specs/sprint-N.md<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"color:#CF0090;font-size:28px;font-weight:600;align-self:center;\">→<\u002Fspan>\n        <div style=\"flex:1.25;background:#fff;border:1.5px solid #F0C6E2;border-radius:12px;padding:22px 18px;display:flex;flex-direction:column;align-items:center;text-align:center;\">\n          <div style=\"font-weight:700;font-size:30px;letter-spacing:-0.02em;\">Verify<\u002Fdiv>\n          <div style=\"font-size:18px;color:#6B6B6B;margin:6px 0 16px;\">QA crew → GREEN / RED<\u002Fdiv>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;color:#CF0090;background:#FFF5FB;border:1px solid #E7A9D2;border-radius:7px;padding:7px 11px;margin-bottom:8px;\">[skill] run-qa<\u002Fspan>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;justify-content:center;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#CF0090;background:#FFF5FB;border:1px solid #E7A9D2;border-radius:7px;padding:6px 9px;\">[agent] linter<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#CF0090;background:#FFF5FB;border:1px solid #E7A9D2;border-radius:7px;padding:6px 9px;\">[agent] code-reviewer<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#CF0090;background:#FFF5FB;border:1px solid #E7A9D2;border-radius:7px;padding:6px 9px;\">[agent] playwright-tester<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"color:#CF0090;font-size:28px;font-weight:600;align-self:center;\">→<\u002Fspan>\n        <div style=\"flex:1;background:#fff;border:1.5px solid #F0C6E2;border-radius:12px;padding:22px 18px;display:flex;flex-direction:column;align-items:center;text-align:center;\">\n          <div style=\"font-weight:700;font-size:30px;letter-spacing:-0.02em;\">Document<\u002Fdiv>\n          <div style=\"font-size:18px;color:#6B6B6B;margin:6px 0 16px;\">tick manifest, handoff<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;width:100%;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;color:#0A0A0A;background:#FAFAFA;border:1px solid #DADADA;border-radius:7px;padding:7px 10px;\">roadmap.md → [x]<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;color:#0A0A0A;background:#FAFAFA;border:1px solid #DADADA;border-radius:7px;padding:7px 10px;\">PROGRESS.md → handoff<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.04em;color:#CF0090;text-align:center;\">↺&nbsp;&nbsp;RED → fix → re-run [skill] run-qa &nbsp;(max 3 attempts, then stop)<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>21<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"The System\" data-speaker-notes=\"That's the whole architecture. Setup is what the system knows before it starts. Actors are who does the work. The orchestrator keeps it moving. Before the details, here's how they fit together.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:96px 140px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE SYSTEM<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:44px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:30px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;\">The setup stage is for our specifications and agreements<\u002Fh2>\n  <div style=\"display:flex;align-items:center;gap:18px;margin-top:30px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;\">Stage 1 / 3 · Setup<\u002Fspan>\n    <div style=\"display:flex;gap:7px;\">\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#CF0090;\"><\u002Fspan>\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#E6E6E6;\"><\u002Fspan>\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#E6E6E6;\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:18px;font-size:24px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">Why first: the system can't act until it knows the rules.<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:72px;\">\n    <div style=\"border:2px solid #CF0090;border-radius:14px;padding:44px 40px;display:flex;flex-direction:column;height:100%;background:#FFF5FB;box-shadow:0 12px 40px rgba(207,0,144,0.12);\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:14px;\">Setup<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:40px;letter-spacing:-0.02em;margin-bottom:30px;\">What it knows<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Tech Lead<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>PM<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Design<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>QA Lead<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:44px 40px;display:flex;flex-direction:column;height:100%;opacity:0.32;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:14px;\">Actors<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:40px;letter-spacing:-0.02em;margin-bottom:30px;\">Who does the work<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>The Builder<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>QA Team (x3)<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>QA Manager<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:44px 40px;display:flex;flex-direction:column;height:100%;opacity:0.32;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:14px;\">Orchestrator<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:40px;letter-spacing:-0.02em;margin-bottom:30px;\">What keeps it moving<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Eng Manager<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>PM<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>22<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Broad Context\" data-speaker-notes=\"Open CLAUDE.md. This is everything true for every sprint — tech stack, conventions, and the definition of done: 'Not done until run-qa returns GREEN.' That one line makes the whole system work. Then prompt.md — what the Builder reads at the start of every session. Same instructions every time. The prompt is the method; the specs are the content.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:grid;grid-template-columns:1fr 1.05fr;gap:80px;box-sizing:border-box;position:relative;overflow:hidden;align-items:center;\">\n  <div style=\"display:flex;flex-direction:column;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;margin-bottom:36px;\">BROAD CONTEXT (CLAUDE.MD&nbsp;<span style=\"letter-spacing: 5.6px;\">·&nbsp;<\u002Fspan>PROMPT.MD)<\u002Fdiv>\n    <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin-bottom:36px;\"><\u002Fdiv>\n    <h2 style=\"margin:0;font-weight:700;font-size:64px;letter-spacing:-0.03em;line-height:1.0;\">How we work.<\u002Fh2>\n    <p style=\"margin:36px 0 0;font-size:30px;line-height:1.4;color:#6B6B6B;letter-spacing:-0.01em;\">Everything true for <em>every<\u002Fem> sprint: architecture, conventions, and the definition of done. One constraint forces quality —<\u002Fp>\n    <div style=\"margin-top:28px;border-left:3px solid #CF0090;padding-left:24px;font-size:30px;line-height:1.35;color:#0A0A0A;font-weight:600;\">\"Not done until <span style=\"color:#CF0090;\">run-qa<\u002Fspan> returns GREEN.\"<\u002Fdiv>\n    <div style=\"margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.02em;color:#9A9A9A;\">This is the scaffolding that earns the trust.<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:24px;\">\n    <div style=\"background:#141414;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.18);\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:16px 22px;border-bottom:1px solid #262626;\">\n        <span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;color:#8A8A8A;margin-left:10px;\">CLAUDE.md<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:26px 28px;font-family:'JetBrains Mono',monospace;font-size:21px;line-height:1.65;color:#D8D8D8;\">\n        <div style=\"color:#7FB0FF;\"># Project architecture &amp; conventions<\u002Fdiv>\n        <div style=\"color:#7FB0FF;\"># Marching orders, every session<\u002Fdiv>\n        <div style=\"margin-top:14px;color:#9A9A9A;\">## Definition of done<\u002Fdiv>\n        <div style=\"color:#FF6FC8;\">Not done until run-qa is GREEN.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#141414;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.18);\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:16px 22px;border-bottom:1px solid #262626;\">\n        <span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;color:#8A8A8A;margin-left:10px;\">prompt.md<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:26px 28px;font-family:'JetBrains Mono',monospace;font-size:21px;line-height:1.65;color:#D8D8D8;\">\n        <div style=\"color:#9A9A9A;\">Read the manifest. Pick the next sprint.<\u002Fdiv>\n        <div style=\"color:#9A9A9A;\">Build it. Run QA. Update state.<\u002Fdiv>\n        <div style=\"margin-top:10px;color:#6B6B6B;\"># same instructions, every time<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>23<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Manifest\" data-speaker-notes=\"Open roadmap.md. Three characters per line — that's your state machine. The orchestrator reads it to know if there's work left. The Builder reads it to know what to pick up. You read it to know where things stand. After each sprint the checkbox ticks. If something gets stuck, it marks [!] and stops. This file IS your project status.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:grid;grid-template-columns:1fr 1.05fr;gap:80px;box-sizing:border-box;position:relative;overflow:hidden;align-items:center;\">\n  <div style=\"display:flex;flex-direction:column;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;margin-bottom:36px;\">THE MANIFEST (ROADMAP.MD)<\u002Fdiv>\n    <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin-bottom:36px;\"><\u002Fdiv>\n    <h2 style=\"margin:0;font-weight:700;font-size:64px;letter-spacing:-0.03em;line-height:1.0;\">What needs to get done, where we're at.<\u002Fh2>\n    <p style=\"margin:36px 0 0;font-size:30px;line-height:1.4;color:#6B6B6B;letter-spacing:-0.01em;\">Three characters per line — that's your state machine. The checkbox ticks after each sprint. Stuck work marks <span style=\"font-family:'JetBrains Mono',monospace;color:#CF0090;\">[!]<\u002Fspan> and stops.<\u002Fp>\n    <div style=\"margin-top:28px;border-left:3px solid #CF0090;padding-left:24px;font-size:30px;line-height:1.35;color:#0A0A0A;font-weight:600;\">This file <span style=\"color:#CF0090;\">is<\u002Fspan> your project status.<\u002Fdiv>\n    <div style=\"margin-top:28px;display:flex;flex-wrap:wrap;gap:10px 28px;font-family:'JetBrains Mono',monospace;font-size:19px;color:#6B6B6B;\">\n      <span><span style=\"color:#9A9A9A;\">[ ]<\u002Fspan>&nbsp; to do<\u002Fspan>\n      <span><span style=\"color:#5FCf8f;\">[x]<\u002Fspan>&nbsp; done<\u002Fspan>\n      <span><span style=\"color:#FF6FC8;\">[!]<\u002Fspan>&nbsp; blocked — stops for a human<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#141414;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.18);\">\n    <div style=\"display:flex;align-items:center;gap:10px;padding:16px 22px;border-bottom:1px solid #262626;\">\n      <span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;color:#8A8A8A;margin-left:10px;\">roadmap.md<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"padding:34px 32px;font-family:'JetBrains Mono',monospace;font-size:20px;line-height:2.2;color:#D8D8D8;\">\n      <div><span style=\"color:#5FCf8f;\">- [x]<\u002Fspan> Sprint 1: Core clicker — harvest + persistent score<\u002Fdiv>\n      <div><span style=\"color:#5FCf8f;\">- [x]<\u002Fspan> Sprint 2: Farmhands — buy auto-harvesters<\u002Fdiv>\n      <div><span style=\"color:#FF6FC8;\">- [ ]<\u002Fspan> Sprint 3: Scaling cost — price curve + spend guard<\u002Fdiv>\n      <div style=\"color:#7A7A7A;\"><span style=\"color:#6B6B6B;\">- [ ]<\u002Fspan> Sprint 4: Polish — number formatting + click pulse<\u002Fdiv>\n      <div><span style=\"color:#FF6FC8;\">- [!]<\u002Fspan> Sprint 5: Cloud sync — blocked, needs API key<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>24<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Anatomy of a Roadmap\" data-speaker-notes=\"You learned the file format; here's how to decompose work into it. A weak roadmap is horizontal layers — build all the models, then all the UI — and nothing runs until the very end. A good roadmap is vertical slices: each sprint ships something runnable, ordered by dependency, with the three-character state legible at a glance. Decomposition is half of moving up the stack.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:60px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">How to decompose · roadmap.md<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:22px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:22px 0 0;font-weight:700;font-size:50px;letter-spacing:-0.03em;line-height:1.0;\">Slice it vertically, not horizontally.<\u002Fh2>\n  <div style=\"flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:36px;margin-top:30px;\">\n    <div style=\"display:flex;flex-direction:column;min-height:0;min-width:0;\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">Weak · horizontal layers<\u002Fspan><span style=\"color:#C9C9C9;font-size:20px;\">✕<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:26px 30px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.65;color:#9A9A9A;white-space:pre;\"><div># Roadmap<\u002Fdiv><div>- [ ] Build all data models<\u002Fdiv><div>- [ ] Build all API endpoints<\u002Fdiv><div>- [ ] Build all UI screens<\u002Fdiv><div>- [ ] Wire it together<\u002Fdiv><div>- [ ] Test everything<\u002Fdiv><\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px;font-size:22px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">Nothing runs until the very end. No verifiable step — nothing for QA to gate.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;min-height:0;min-width:0;\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;\">Good · vertical slices<\u002Fspan><span style=\"color:#1F8A4C;font-size:20px;\">✓<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:26px 30px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.7;color:#D8D8D8;white-space:pre;\"><div><span style=\"color:#7FB0FF;\"># Roadmap · vertical slices<\u002Fspan><\u002Fdiv><div><span style=\"color:#5FCf8f;\">- [x]<\u002Fspan> S1  Click to earn  <span style=\"color:#6B6B6B;\">ships a page<\u002Fspan><\u002Fdiv><div><span style=\"color:#5FCf8f;\">- [x]<\u002Fspan> S2  Earnings chart <span style=\"color:#6B6B6B;\">on top of S1<\u002Fspan><\u002Fdiv><div><span style=\"color:#FF6FC8;\">- [ ]<\u002Fspan> S3  Hire farmhands <span style=\"color:#6B6B6B;\">needs S1<\u002Fspan><\u002Fdiv><div><span style=\"color:#FF6FC8;\">- [ ]<\u002Fspan> S4  Idle income    <span style=\"color:#6B6B6B;\">needs S3<\u002Fspan><\u002Fdiv><\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px;font-size:22px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">Each slice ships a working app, ordered by dependency. <span style=\"font-family:'JetBrains Mono',monospace;font-size:19px;color:#CF0090;\">[ ] [x] [!]<\u002Fspan> legible at a glance.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>25<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Specific Context\" data-speaker-notes=\"Open specs/sprint-1.md. This is where YOUR engineering judgment lives. The spec defines what to build, how to verify it, and what to watch out for. A good spec makes the build trivial; a vague spec makes it unpredictable. At Driving you write code. At Helicopter you write specs. Your brain moves up the stack.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:grid;grid-template-columns:1fr 1.05fr;gap:80px;box-sizing:border-box;position:relative;overflow:hidden;align-items:center;\">\n  <div style=\"display:flex;flex-direction:column;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;margin-bottom:36px;\">SPECIFIC CONTEXT (SPRINT-X.MD)<\u002Fdiv>\n    <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin-bottom:36px;\"><\u002Fdiv>\n    <h2 style=\"margin:0;font-weight:700;font-size:64px;letter-spacing:-0.03em;line-height:1.0;\">What to build this turn.<\u002Fh2>\n    <p style=\"margin:36px 0 0;font-size:30px;line-height:1.4;color:#6B6B6B;letter-spacing:-0.01em;\">One spec per sprint: acceptance criteria, technical approach, edge cases. This is where your engineering judgment lives.<\u002Fp>\n    <div style=\"margin-top:28px;border-left:3px solid #CF0090;padding-left:24px;font-size:30px;line-height:1.35;color:#0A0A0A;font-weight:600;\">At Driving you write code. At Helicopter you write <span style=\"color:#CF0090;\">specs.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#141414;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.18);\">\n    <div style=\"display:flex;align-items:center;gap:10px;padding:16px 22px;border-bottom:1px solid #262626;\">\n      <span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;color:#8A8A8A;margin-left:10px;\">specs/sprint-1.md<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"padding:30px 30px;font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.7;color:#D8D8D8;\">\n      <div style=\"color:#7FB0FF;\"># Sprint 1 — Core clicker<\u002Fdiv>\n      <div style=\"margin-top:14px;color:#9A9A9A;\">## Acceptance criteria<\u002Fdiv>\n      <div>· Click <span style=\"color:#E78FCF;\">#harvest<\u002Fspan> → <span style=\"color:#E78FCF;\">#score<\u002Fspan> +1<\u002Fdiv>\n      <div>· Score persists on reload<\u002Fdiv>\n      <div style=\"margin-top:14px;color:#9A9A9A;\">## Approach<\u002Fdiv>\n      <div>· Single index.html, localStorage `clickfarm` { score, farmhands }<\u002Fdiv>\n      <div style=\"margin-top:14px;color:#9A9A9A;\">## Edge cases<\u002Fdiv>\n      <div style=\"color:#FF6FC8;\">· Score stays a non-negative integer<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>26<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Anatomy of a Spec\" data-speaker-notes=\"This is where your judgment lives, so here's the texture. The vague spec — 'let players hire farmhands' — gives the builder nothing to verify, and the build comes out unpredictable. The fat spec spells out acceptance criteria and the trap to avoid: a hire you can't afford must be blocked, the score must never go negative. A good spec makes the build trivial and QA decisive.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:60px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">Where judgment lives · sprint-3.md<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:22px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:22px 0 0;font-weight:700;font-size:50px;letter-spacing:-0.03em;line-height:1.0;\">A good spec makes the build trivial.<\u002Fh2>\n  <div style=\"flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.25fr);gap:36px;margin-top:30px;\">\n    <div style=\"display:flex;flex-direction:column;min-height:0;min-width:0;\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">Thin · vague<\u002Fspan><span style=\"color:#C9C9C9;font-size:20px;\">✕<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:26px 30px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.6;color:#9A9A9A;white-space:pre-wrap;\"><span style=\"color:#7FB0FF;\"># Sprint 3: Hiring<\u002Fspan>\n\nLet players hire farmhands\nthat help out automatically.<\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px;font-size:22px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">No criteria. No edge cases. The build is a guess; QA has nothing to assert.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;min-height:0;min-width:0;\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;\">Fat · explicit<\u002Fspan><span style=\"color:#1F8A4C;font-size:20px;\">✓<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:26px 30px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.55;color:#D8D8D8;white-space:pre;\"><div><span style=\"color:#7FB0FF;\"># Sprint 3: Scaling Cost<\u002Fspan><\u002Fdiv><div><span style=\"color:#9A9A9A;\">## Acceptance Criteria<\u002Fspan><\u002Fdiv><div>- <span style=\"color:#E78FCF;\">#cost<\u002Fspan> rises per the formula<\u002Fdiv><div>- score &lt; cost → <span style=\"color:#E78FCF;\">#hire<\u002Fspan> does nothing<\u002Fdiv><div>- hire at score == cost succeeds<\u002Fdiv><div>&nbsp;<\u002Fdiv><div><span style=\"color:#9A9A9A;\">## Watch out for<\u002Fspan><\u002Fdiv><div><span style=\"color:#FF6FC8;\">- a hire you can't afford MUST be blocked<\u002Fspan><\u002Fdiv><div><span style=\"color:#FF6FC8;\">- score must never go below 0<\u002Fspan><\u002Fdiv><\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px;font-size:22px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">Explicit criteria + the trap to avoid. The build is trivial; <span style=\"color:#CF0090;\">QA is decisive.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>27<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"The System\" data-speaker-notes=\"That's the whole architecture. Setup is what the system knows before it starts. Actors are who does the work. The orchestrator keeps it moving. Before the details, here's how they fit together.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:96px 140px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE SYSTEM<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:44px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:30px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;\">Now, it's time to build.<\u002Fh2>\n  <div style=\"display:flex;align-items:center;gap:18px;margin-top:30px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;\">Stage 2 / 3 · Actors<\u002Fspan>\n    <div style=\"display:flex;gap:7px;\">\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#CF0090;\"><\u002Fspan>\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#CF0090;\"><\u002Fspan>\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#E6E6E6;\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:18px;font-size:24px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">Why next: someone has to do the work — and check it.<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:72px;\">\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:44px 40px;display:flex;flex-direction:column;height:100%;opacity:0.32;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:14px;\">Setup<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:40px;letter-spacing:-0.02em;margin-bottom:30px;\">What it knows<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Tech Lead<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>PM<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Design<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>QA Lead<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:2px solid #CF0090;border-radius:14px;padding:44px 40px;display:flex;flex-direction:column;height:100%;background:#FFF5FB;box-shadow:0 12px 40px rgba(207,0,144,0.12);\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:14px;\">Actors<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:40px;letter-spacing:-0.02em;margin-bottom:30px;\">Who does the work<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>The Builder<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>QA Team (x3)<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>QA Manager<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:44px 40px;display:flex;flex-direction:column;height:100%;opacity:0.32;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:14px;\">Orchestrator<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:40px;letter-spacing:-0.02em;margin-bottom:30px;\">What keeps it moving<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Eng Manager<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>PM<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>28<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<section data-label=\"Meet the Builder\" data-speaker-notes=\"So who actually does the work? The Builder. And the Builder is nothing exotic — it's a single Claude Code session, spun up fresh for exactly one sprint, then thrown away. It reads the context, writes the code, checks its own work, and hands off. The magic isn't a smarter agent — it's that every sprint gets a clean brain, with no accumulated confusion from the last one.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:grid;grid-template-columns:0.82fr 1.18fr;gap:84px;box-sizing:border-box;position:relative;overflow:hidden;align-items:center;\">\n  <div style=\"display:flex;flex-direction:column;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;margin-bottom:36px;\">THE BUILDER<\u002Fdiv>\n    <div style=\"background:#141414;border-radius:28px;padding:40px 40px 36px;box-shadow:0 40px 80px rgba(0,0,0,0.10), 0 8px 20px rgba(0,0,0,0.05);\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:28px;\">\n        <span style=\"width:12px;height:12px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:12px;height:12px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:12px;height:12px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#8A8A8A;margin-left:8px;\">builder · sprint session<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:23px;line-height:1.7;color:#D8D8D8;\">\n        <div><span style=\"color:#5FCf8f;\">$<\u002Fspan> claude -p \"$(cat prompt.md)\"<\u002Fdiv>\n        <div style=\"color:#6B6B6B;margin-top:10px;\">reading context…<\u002Fdiv>\n        <div style=\"color:#6B6B6B;\">building feature…<\u002Fdiv>\n        <div style=\"margin-top:10px;\">writing index.html<span style=\"display:inline-block;width:12px;height:24px;background:#CF0090;margin-left:6px;vertical-align:-5px;\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;\">\n    <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin-bottom:36px;\"><\u002Fdiv>\n    <h2 style=\"margin:0;font-weight:700;font-size:64px;letter-spacing:-0.03em;line-height:1.0;\">Executes the spec for a single&nbsp; feature / sprint. Then done.<\u002Fh2>\n    <p style=\"margin:32px 0 44px;font-size:30px;line-height:1.4;color:#6B6B6B;letter-spacing:-0.01em;max-width:720px;\">The Builder is just a Claude Code session — no special framework, no persistent agent. Spun up fresh for one sprint, then thrown away. Its power is that nothing carries over.<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;border-top:1px solid #E6E6E6;\">\n      <div style=\"display:flex;gap:28px;align-items:baseline;padding:22px 0;border-bottom:1px solid #EFEFEF;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.18em;text-transform:uppercase;color:#CF0090;flex:0 0 200px;\">Stateless<\u002Fdiv>\n        <div style=\"font-size:28px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">Clean brain every turn — no context rot from the last sprint.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:28px;align-items:baseline;padding:22px 0;border-bottom:1px solid #EFEFEF;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.18em;text-transform:uppercase;color:#CF0090;flex:0 0 200px;\">Self-checking<\u002Fdiv>\n        <div style=\"font-size:28px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">It calls run-qa on its own work before it ever declares done.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:28px;align-items:baseline;padding:22px 0;border-bottom:1px solid #EFEFEF;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.18em;text-transform:uppercase;color:#CF0090;flex:0 0 200px;\">Hands off<\u002Fdiv>\n        <div style=\"font-size:28px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">Writes its memory to PROGRESS.md so the next session can pick up.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>29<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The Skill\" data-speaker-notes=\"Open SKILL.md. The skill is the bridge. When the Builder finishes coding it calls run-qa. The skill runs all three QA agents in sequence and returns one verdict: GREEN or RED. If RED, the Builder reads the failures, fixes them, tries again — up to 3 attempts. Still RED after 3, it marks the sprint blocked and stops. That's your signal to step in. Nothing passes without it.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE QA MANAGER<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:28px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;\">When code is complete, the&nbsp;<div>manager delegates the QA tasks<\u002Fdiv><\u002Fh2>\n  <p style=\"margin:18px 0 0;max-width:1500px;font-size:27px;line-height:1.32;color:#6B6B6B;letter-spacing:-0.01em;\">One call — <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;\">run-qa<\u002Fspan> — runs all three QA agents and returns a single verdict: GREEN or RED. RED three times and it stops for a human.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1.04fr;gap:72px;margin-top:56px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;gap:18px;\">\n      <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:22px;background:#141414;color:#fff;border-radius:11px;padding:16px 24px;\">run-qa<\u002Fdiv>\n        <span style=\"color:#C4C4C4;font-size:24px;\">→<\u002Fspan>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:21px;border:1px solid #DADADA;border-radius:11px;padding:16px 22px;background:#fff;\">Lint<\u002Fdiv>\n        <span style=\"color:#C4C4C4;font-size:24px;\">→<\u002Fspan>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:21px;border:1px solid #DADADA;border-radius:11px;padding:16px 22px;background:#fff;\">Review<\u002Fdiv>\n        <span style=\"color:#C4C4C4;font-size:24px;\">→<\u002Fspan>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:21px;border:1px solid #DADADA;border-radius:11px;padding:16px 22px;background:#fff;\">Test<\u002Fdiv>\n        <span style=\"color:#C4C4C4;font-size:24px;\">→<\u002Fspan>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:22px;border-radius:11px;padding:16px 24px;background:#E9F7EE;color:#1F8A4C;border:1px solid #BFE6CC;\">GREEN<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:20px;line-height:1.5;color:#CF0090;border:1px dashed #E7A9D2;border-radius:11px;padding:16px 24px;background:#FFF5FB;\">↺&nbsp;&nbsp;RED → read failures → fix → re-run<br>max 3 attempts, then mark blocked &amp; stop<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#0E0E0E;border:1px solid #232323;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.18);\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:16px 22px;border-bottom:1px solid #232323;\">\n        <span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#3A3A3A;\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:17px;color:#8A8A8A;margin-left:10px;\">.claude/skills/run-qa/SKILL.md<\u002Fspan>\n      <\u002Fdiv>\n<pre style=\"margin:0;padding:24px 28px;font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.5;color:#D8D8D8;white-space:pre;\"><span style=\"color:#6B6B6B;\">---<\u002Fspan>\n<span style=\"color:#9ED49E;\">name:<\u002Fspan> run-qa\n<span style=\"color:#9ED49E;\">description:<\u002Fspan> Full QA pass — lint, review,\n  e2e. Returns one GREEN/RED verdict.\n<span style=\"color:#6B6B6B;\">---<\u002Fspan>\n\n<span style=\"color:#7FB0FF;\"># run-qa<\u002Fspan>\nRun these in order, each as a subagent:\n1. Delegate to <span style=\"color:#FF6FC8;\">linter<\u002Fspan>.\n2. Delegate to <span style=\"color:#FF6FC8;\">code-reviewer<\u002Fspan>.\n3. Delegate to <span style=\"color:#FF6FC8;\">playwright-tester<\u002Fspan>.\n\n<span style=\"color:#9A9A9A;\">Verdict:<\u002Fspan> any lint error, CRITICAL\nfinding, or failed spec → RED.\nOtherwise → GREEN.\n\nIf RED: fix, re-run from step 1.\nStop after 3 attempts; report to human.<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>30<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The QA Crew\" data-speaker-notes=\"Open the .claude/agents folder. Three specialists. They don't build — they verify. Each has one job and a narrow scope. The linter catches formatting, the reviewer catches bugs, the tester catches broken behavior. They run on a cheaper, faster model — they just need to check. Together they're your automated code review.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE QUALITY TEAM<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:28px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;\">Each team member has a very specific job.<\u002Fh2>\n  <div style=\"margin-top:28px;display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.04em;color:#9A9A9A;\"><span style=\"color:#0A0A0A;background:#F2F1EE;border:1px solid #E6E6E6;border-radius:8px;padding:8px 12px;\">.claude/agents/<\u002Fspan><span>They check, they don't build — cheaper, faster models.<\u002Fspan><\u002Fdiv>\n  <div style=\"margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:19px;letter-spacing:0.02em;color:#9A9A9A;\">This is the scaffolding that earns the trust — the answer to the doubt loop from Part 1.<\u002Fdiv>\n  <div style=\"margin-top:16px;display:flex;align-items:center;flex-wrap:wrap;gap:13px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.03em;color:#6B6B6B;border:1px solid #E6E6E6;border-radius:8px;padding:7px 12px;\">Judgment · latent<\u002Fspan>\n    <span style=\"color:#C4C4C4;font-size:18px;\">vs<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.03em;color:#CF0090;background:#FFF5FB;border:1px solid #E7A9D2;border-radius:8px;padding:7px 12px;\">Verification · deterministic<\u002Fspan>\n    <span style=\"font-size:22px;color:#0A0A0A;letter-spacing:-0.01em;\">The crew runs a test, not a vibe check — that's why it catches the bug.<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:22px;\">\n    <sc-for list=\"{{ qaCrew }}\" as=\"q\" hint-placeholder-count=\"3\">\n      <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:32px 30px;display:flex;flex-direction:column;height:100%;\">\n        <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:12px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:40px;color:#CF0090;line-height:1;\">{{ q.mark }}<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:36px;letter-spacing:-0.02em;\">{{ q.name }}<\u002Fdiv>\n          <div style=\"margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:0.04em;color:#CF0090;background:#FFF5FB;border:1px solid #E7A9D2;border-radius:7px;padding:5px 10px;\">{{ q.model }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:25px;line-height:1.35;color:#6B6B6B;margin-bottom:22px;\">{{ q.job }}<\u002Fdiv>\n        <pre style=\"margin:0;background:#0E0E0E;border:1px solid #232323;border-radius:10px;padding:18px 20px;font-family:'JetBrains Mono',monospace;font-size:16px;line-height:1.55;color:#D8D8D8;white-space:pre;overflow:hidden;\">{{ q.snippet }}<\u002Fpre>\n        <div style=\"margin-top:auto;padding-top:20px;font-family:'JetBrains Mono',monospace;font-size:16px;color:#0A0A0A;background:transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ q.file }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>31<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"The Inner Loop\" data-speaker-notes=\"So what happens when QA comes back RED? It doesn't stop, and it doesn't ask you — it goes straight back to the Builder. The run-qa verdict isn't just pass/fail; on RED it carries the actual failures: the failed assertion, the lint error, the bug the reviewer flagged. The Builder reads those, fixes the code, and calls run-qa again. Verify, fix, re-verify — that's the inner loop, and it turns on its own until the verdict is GREEN. The one guardrail: three attempts. If it's still RED after the third try, it stops, marks the sprint blocked with [!], and that's your signal to step in. So it's autonomous, but it's not infinite — it knows when it's stuck.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:80px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE INNER LOOP<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:32px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:24px 0 0;font-weight:700;font-size:54px;letter-spacing:-0.03em;line-height:1.0;max-width:1400px;\">RED doesn't stop the loop — it routes back to the Builder.<\u002Fh2>\n  <p style=\"margin:16px 0 0;max-width:1500px;font-size:27px;line-height:1.32;color:#6B6B6B;letter-spacing:-0.01em;\">On RED, the verdict carries the actual failures — the Builder reads them, patches, and re-runs. Three attempts, then it stops. <span style=\"color:#0A0A0A;\">RED isn't an opinion — it's a failed assertion; the fix targets a fact, not a feeling.<\u002Fspan><\u002Fp>\n\n  <div style=\"position:relative;flex:1;margin-top:72px;display:flex;flex-direction:column;justify-content:center;\">\n    <!-- return path: from verdict back to builder -->\n    <div style=\"position:relative;height:62px;\">\n      <div style=\"position:absolute;left:16%;right:16%;top:12px;height:48px;border:2px dashed #CF0090;border-bottom:none;border-radius:18px 18px 0 0;\"><\u002Fdiv>\n      <div style=\"position:absolute;left:50%;top:2px;transform:translateX(-50%);background:#FAFAFA;padding:0 16px;font-family:'JetBrains Mono',monospace;font-size:19px;letter-spacing:0.06em;color:#CF0090;white-space:nowrap;\">RED&nbsp;→&nbsp;read failures · fix · re-run<\u002Fdiv>\n      <div style=\"position:absolute;left:calc(16% - 8px);bottom:-2px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:12px solid #CF0090;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- the row -->\n    <div style=\"display:flex;align-items:stretch;justify-content:space-between;gap:0;width:100%;\">\n      <!-- builder -->\n      <div style=\"flex:1;border:2px solid #CF0090;border-radius:16px;background:#FFF5FB;padding:34px 34px;display:flex;flex-direction:column;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:18px;\">The Builder<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:34px;letter-spacing:-0.02em;margin-bottom:10px;\">Write &amp; fix<\u002Fdiv>\n        <div style=\"font-size:24px;line-height:1.32;color:#6B6B6B;\">Builds the feature. On a RED return, reads the failures and patches the code.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:0 0 78px;display:flex;align-items:center;justify-content:center;color:#C4C4C4;font-size:30px;\">→<\u002Fdiv>\n      <!-- verify -->\n      <div style=\"flex:1;border:1px solid #E6E6E6;border-radius:16px;background:#fff;padding:34px 34px;display:flex;flex-direction:column;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:#B5B5B5;margin-bottom:18px;\">run-qa<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:34px;letter-spacing:-0.02em;margin-bottom:10px;\">Verify<\u002Fdiv>\n        <div style=\"font-size:24px;line-height:1.32;color:#6B6B6B;\">Lint · review · test. Returns one verdict — and the failures with it.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:0 0 78px;display:flex;align-items:center;justify-content:center;color:#C4C4C4;font-size:30px;\">→<\u002Fdiv>\n      <!-- verdict -->\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:16px;justify-content:center;\">\n        <div style=\"display:flex;align-items:center;gap:16px;border:2px solid #CF0090;border-radius:14px;background:#FFF5FB;padding:20px 24px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;letter-spacing:0.06em;color:#CF0090;\">RED<\u002Fspan>\n          <span style=\"font-size:22px;color:#6B6B6B;line-height:1.25;\">loops back ↑<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:16px;border:1px solid #BFE6CC;border-radius:14px;background:#E9F7EE;padding:20px 24px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;letter-spacing:0.06em;color:#1F8A4C;\">GREEN<\u002Fspan>\n          <span style=\"font-size:22px;color:#3A7A55;line-height:1.25;\">exits → Document<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:36px;border-top:1px solid #E6E6E6;padding-top:26px;display:flex;align-items:center;gap:26px;\">\n    <div style=\"display:flex;align-items:center;gap:11px;\">\n      <span style=\"width:16px;height:16px;border-radius:50%;background:#CF0090;\"><\u002Fspan>\n      <span style=\"width:16px;height:16px;border-radius:50%;background:#CF0090;\"><\u002Fspan>\n      <span style=\"width:16px;height:16px;border-radius:50%;border:2px solid #CF0090;background:#FAFAFA;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">Three attempts, then it stops. Still RED after the third try → mark the sprint <span style=\"font-family:'JetBrains Mono',monospace;color:#CF0090;\">[!]<\u002Fspan> blocked and hand back to a human. Autonomous, never infinite.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>32<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"The System\" data-speaker-notes=\"That's the whole architecture. Setup is what the system knows before it starts. Actors are who does the work. The orchestrator keeps it moving. Before the details, here's how they fit together.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:96px 140px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE SYSTEM<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:44px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:30px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;\">Close the sprint, and move to the next.<\u002Fh2>\n  <div style=\"display:flex;align-items:center;gap:18px;margin-top:30px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;\">Stage 3 / 3 · Orchestrator<\u002Fspan>\n    <div style=\"display:flex;gap:7px;\">\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#CF0090;\"><\u002Fspan>\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#CF0090;\"><\u002Fspan>\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#CF0090;\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:18px;font-size:24px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">Why last: something has to keep the sprints moving, hands-free.<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:72px;\">\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:44px 40px;display:flex;flex-direction:column;height:100%;opacity:0.32;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:14px;\">Setup<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:40px;letter-spacing:-0.02em;margin-bottom:30px;\">What it knows<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Tech Lead<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>PM<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Design<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>QA Lead<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:44px 40px;display:flex;flex-direction:column;height:100%;opacity:0.32;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:14px;\">Actors<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:40px;letter-spacing:-0.02em;margin-bottom:30px;\">Who does the work<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>The Builder<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>QA Team (x3)<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>QA Manager<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:2px solid #CF0090;border-radius:14px;padding:44px 40px;display:flex;flex-direction:column;height:100%;background:#FFF5FB;box-shadow:0 12px 40px rgba(207,0,144,0.12);\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:14px;\">Orchestrator<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:40px;letter-spacing:-0.02em;margin-bottom:30px;\">What keeps it moving<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Eng Manager<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>PM<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>33<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"The Document Step\" data-speaker-notes=\"Before the session ends — and only once QA is GREEN — it writes itself down. Three files, three different jobs. First it ticks the box in roadmap.md so the next turn knows this sprint is done. Then it appends a handoff to PROGRESS.md: what it built, the decisions it made, anything the next session needs. And if it discovered something durable — a convention, a gotcha, a rule that should hold for every future sprint — it promotes that up into CLAUDE.md so it becomes permanent context. Roadmap is state, PROGRESS is memory, CLAUDE is learning. That's how a stateless session compounds.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:80px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>KNOWLEDGE HANDOFF<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:32px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:24px 0 0;font-weight:700;font-size:54px;letter-spacing:-0.03em;line-height:1.0;max-width:1400px;\">On GREEN, the session writes itself down.<\u002Fh2>\n  <div style=\"display:flex;align-items:center;gap:14px;margin:30px 0 36px;font-family:'JetBrains Mono',monospace;font-size:20px;\">\n    <span style=\"border-radius:9px;padding:11px 18px;background:#E9F7EE;color:#1F8A4C;border:1px solid #BFE6CC;\">QA GREEN<\u002Fspan>\n    <span style=\"color:#C4C4C4;font-size:22px;\">→<\u002Fspan>\n    <span style=\"color:#6B6B6B;letter-spacing:0.02em;\">three writes — roadmap = state · PROGRESS = memory · CLAUDE = learning<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px;flex:1;\">\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:30px 30px 0;display:flex;flex-direction:column;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:8px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;color:#CF0090;\">01<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500;letter-spacing:-0.01em;\">roadmap.md<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:25px;line-height:1.32;color:#6B6B6B;margin-bottom:22px;\">Tick the box. The state machine advances.<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#B5B5B5;margin-bottom:10px;\">State<\u002Fdiv>\n<pre style=\"margin:0 -30px;background:#0E0E0E;border-top:1px solid #232323;border-radius:0 0 14px 14px;padding:20px 26px;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.6;color:#D8D8D8;white-space:pre;\"><span style=\"color:#FF6FC8;\">- [ ]<\u002Fspan> Sprint 3: scaling cost\n<span style=\"color:#5FCf8f;\">- [x]<\u002Fspan> Sprint 3: scaling cost<\u002Fpre>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:30px 30px 0;display:flex;flex-direction:column;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:8px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;color:#CF0090;\">02<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500;letter-spacing:-0.01em;\">PROGRESS.md<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:25px;line-height:1.32;color:#6B6B6B;margin-bottom:22px;\">Append a handoff for the next session.<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#B5B5B5;margin-bottom:10px;\">Memory<\u002Fdiv>\n<pre style=\"margin:0 -30px;background:#0E0E0E;border-top:1px solid #232323;border-radius:0 0 14px 14px;padding:20px 26px;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.6;color:#D8D8D8;white-space:pre;\"><span style=\"color:#9ED49E;\">## Sprint 3<\u002Fspan>\nscaled hire cost.\nspend bug → fixed\n(guard the spend)<\u002Fpre>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:30px 30px 0;display:flex;flex-direction:column;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:8px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;color:#CF0090;\">03<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500;letter-spacing:-0.01em;\">CLAUDE.md<\
