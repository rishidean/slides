  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2px;\"><\u002Fdiv>\n    <h1 style=\"margin:0;font-weight:800;letter-spacing:-0.045em;line-height:0.9;font-size:208px;\">Getting<br>airborne<\u002Fh1>\n    <p style=\"margin:0;max-width:1000px;font-size:38px;line-height:1.32;letter-spacing:-0.01em;color:#6B6B6B;\">Demystifying agentic engineering, so we can leave the \"ground\" and \"take flight\" on the <a href=\"https://www.rishidean.com/why-youre-not-seeing-the-gains-from-ai/\" style=\"color: rgb(207, 0, 144); text-decoration: none; border-bottom: 2px solid rgba(207, 0, 144, 0.32);\">AI Adoption Continuum<\u002Fa>.&nbsp;<\u002Fp>\n    \n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-end;font-family:'JetBrains Mono',monospace;font-size:19px;letter-spacing:0.18em;text-transform:uppercase;color:#B5B5B5;\">\n    \n    <span style=\"color:#0A0A0A;\">RISHI DEAN&nbsp;·&nbsp;<a href=\"https://github.com/rishidean/tutorials-agent-loop\" style=\"color:#CF0090;text-decoration:none;border-bottom:2px solid rgba(207,0,144,0.32);\">github.com/rishidean/tutorials-agent-loop<\u002Fa><\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"How to Read This\" data-speaker-notes=\"Orientation for a reader on their own. This deck has four parts: the frame (where we are), the double loop (the system), your turn (run it yourself), and looking ahead (what it means). Every claim here is runnable — the repo builds a real app, unattended. About fifteen minutes, read at your own pace.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:96px 140px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>HOW TO READ THIS<\u002Fspan><span>SELF-PACED<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:44px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:30px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;\">Mapping the flow.<\u002Fh2>\n  <p style=\"margin:20px 0 0;max-width:1400px;font-size:30px;line-height:1.36;color:#6B6B6B;letter-spacing:-0.01em;\">Read straight through, or simply jump to the part you need.<\u002Fp>\n  <div style=\"display:flex;align-items:stretch;gap:0;margin-top:64px;\">\n    <div onclick=\"{{ navPart1 }}\" style=\"flex:1;display:flex;flex-direction:column;gap:14px;cursor:pointer;\" style-hover=\"opacity:0.62;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#B5B5B5;\">Part 1<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:38px;letter-spacing:-0.025em;line-height:1.0;\">The frame<\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.32;color:#6B6B6B;\">Where we are, and why it has to be you.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:0 0 64px;display:flex;align-items:center;justify-content:center;color:#C4C4C4;font-size:30px;\">→<\u002Fdiv>\n    <div onclick=\"{{ navPart2 }}\" style=\"flex:1;display:flex;flex-direction:column;gap:14px;cursor:pointer;\" style-hover=\"opacity:0.62;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#B5B5B5;\">Part 2<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:38px;letter-spacing:-0.025em;line-height:1.0;\">The double loop<\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.32;color:#6B6B6B;\">The system, taken apart piece by piece.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:0 0 64px;display:flex;align-items:center;justify-content:center;color:#C4C4C4;font-size:30px;\">→<\u002Fdiv>\n    <div onclick=\"{{ navPart3 }}\" style=\"flex:1;display:flex;flex-direction:column;gap:14px;cursor:pointer;\" style-hover=\"opacity:0.62;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;\">Part 3<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:38px;letter-spacing:-0.025em;line-height:1.0;\">Your turn<\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.32;color:#6B6B6B;\">Clone it and run the loop yourself.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:0 0 64px;display:flex;align-items:center;justify-content:center;color:#C4C4C4;font-size:30px;\">→<\u002Fdiv>\n    <div onclick=\"{{ navPart4 }}\" style=\"flex:1;display:flex;flex-direction:column;gap:14px;cursor:pointer;\" style-hover=\"opacity:0.62;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#B5B5B5;\">Part 4<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:38px;letter-spacing:-0.025em;line-height:1.0;\">Looking ahead<\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.32;color:#6B6B6B;\">What airborne means — and the one ask.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:52px;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#B5B5B5;margin-bottom:20px;\">Appendix · jump ahead<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;\">\n      <div onclick=\"{{ navWhyItWorks }}\" style=\"cursor:pointer;border:1px solid #E6E6E6;border-radius:12px;padding:24px 28px;display:flex;flex-direction:column;gap:8px;background:#FFFFFF;\" style-hover=\"border-color:#CF0090;background:#FFF5FB;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;\"><span style=\"font-weight:700;font-size:30px;letter-spacing:-0.02em;color:#0A0A0A;\">Why it works<\u002Fspan><span style=\"color:#CF0090;font-size:24px;line-height:1;\">→<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:21px;line-height:1.3;color:#6B6B6B;\">The theory under the loop — five ideas.<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ navExtending }}\" style=\"cursor:pointer;border:1px solid #E6E6E6;border-radius:12px;padding:24px 28px;display:flex;flex-direction:column;gap:8px;background:#FFFFFF;\" style-hover=\"border-color:#CF0090;background:#FFF5FB;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;\"><span style=\"font-weight:700;font-size:30px;letter-spacing:-0.02em;color:#0A0A0A;\">Extending this model<\u002Fspan><span style=\"color:#CF0090;font-size:24px;line-height:1;\">→<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:21px;line-height:1.3;color:#6B6B6B;\">From solo to org — the four moves.<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ navMakingItRun }}\" style=\"cursor:pointer;border:1px solid #E6E6E6;border-radius:12px;padding:24px 28px;display:flex;flex-direction:column;gap:8px;background:#FFFFFF;\" style-hover=\"border-color:#CF0090;background:#FFF5FB;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;\"><span style=\"font-weight:700;font-size:30px;letter-spacing:-0.02em;color:#0A0A0A;\">Making it run<\u002Fspan><span style=\"color:#CF0090;font-size:24px;line-height:1;\">→<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:21px;line-height:1.3;color:#6B6B6B;\">The actual files, and how to run it.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:auto;display:flex;align-items:center;gap:22px;border-top:1px solid #E6E6E6;padding-top:30px;\">\n    <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;flex-shrink:0;\"><\u002Fdiv>\n    <p style=\"margin:0;font-size:32px;line-height:1.25;letter-spacing:-0.015em;color:#0A0A0A;\">Every claim here is runnable — <span style=\"color:#6B6B6B;\">the repo builds a real app, unattended.<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>2<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Disclaimer\" data-speaker-notes=\"One caveat before we dive in. This is MY way — the loop I personally run. It is not the only way, and it may not be the best way for your situation. The tools are moving fast — skills, subagents, commands are all evolving — so some of this may already be different by the time you see it. Take the principles, not the exact syntax. The shape of the loop matters far more than which file does what. Adapt it to your stack and your team.\" style=\"width:100%;height:100%;background:#F2F1EE;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:120px 140px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#6B6B6B;\">A quick caveat<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 44px;\"><\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:800;font-size:104px;letter-spacing:-0.04em;line-height:0.95;max-width:1400px;\">This is one way.<br>Not <span style=\"color:#CF0090;\">the<\u002Fspan> way.<\u002Fh2>\n  <p style=\"margin:52px 0 0;max-width:1180px;font-size:34px;line-height:1.4;color:#4A4A4A;letter-spacing:-0.01em;\">There are many ways to build agentic loops.&nbsp;This is a simplified version of what I do.&nbsp; The tools are moving fast, and some of this may even be outdated by the time you finish reading this deck!<\u002Fp>\n  <p style=\"margin:30px 0 0;max-width:1180px;font-size:34px;line-height:1.4;color:#0A0A0A;font-weight:600;letter-spacing:-0.01em;\">Take the principles, not the syntax. The shape of the loop matters more than which file does what.<\u002Fp>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>3<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The Paradox\" data-speaker-notes=\"Both true at once. MIT, Nobel laureates, McKinsey measured almost no productivity gain from AI. And yet some practitioners see 10x, 50x. How can both be true? That's the question.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:96px 140px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE PARADOX<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:56px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:36px 0 0;font-weight:700;font-size:72px;letter-spacing:-0.03em;line-height:1.0;max-width:1200px;\">Two realities coexist in the world<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:72px;\">\n    <div style=\"border:1px solid #E6E6E6;border-radius:18px;background:#FFFFFF;padding:56px 56px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.24em;text-transform:uppercase;color:#B5B5B5;margin-bottom:28px;\">The measured reality<\u002Fdiv>\n      <div style=\"font-weight:800;font-size:150px;letter-spacing:-0.04em;line-height:0.9;\">95%<\u002Fdiv>\n      <p style=\"margin:28px 0 0;font-size:34px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">of businesses fail to see meaningful returns on AI.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:2px solid #CF0090;border-radius:18px;background:#FFF5FB;padding:56px 56px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.24em;text-transform:uppercase;color:#CF0090;margin-bottom:28px;\">The lived reality<\u002Fdiv>\n      <div style=\"font-weight:800;font-size:150px;letter-spacing:-0.04em;line-height:0.9;color:#CF0090;\">10×<\u002Fdiv>\n      <p style=\"margin:28px 0 0;font-size:34px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">Solo builders ship in a week what used to take a quarter.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:auto;display:flex;align-items:flex-start;gap:24px;\">\n    <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;flex-shrink:0;margin-top:18px;\"><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <p style=\"margin:0;font-weight:700;font-size:44px;letter-spacing:-0.02em;line-height:1.05;\">How can both of these be true?<\u002Fp>\n      <p style=\"margin:0;font-size:27px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">Both are true. The difference is <span style=\"color:#0A0A0A;font-weight:600;\">how they move<\u002Fspan>, not how hard they work — that's the map, next&nbsp;<span style=\"color:#CF0090;\">→<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>4<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Same Car\" data-speaker-notes=\"[Pause. Let it land.] Here's the reframe for every objection you've heard — 'AI hallucinates,' 'it can't do X,' 'we saw it fail at another company.' Put an automatic-only driver in an F1 car and they spin it into the wall, then file a report on why it's undrivable. Put a pro in the same seat and it's the fastest thing on Earth. The failure reports are real — but they're about drivers, not the car. Which driver you are in two years is up to you.\" style=\"width:100%;height:100%;background:#0A0A0A;color:#FFFFFF;font-family:'Manrope',sans-serif;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <image-slot id=\"f1-cockpit\" style=\"position:absolute;inset:0;width:100%;height:100%;z-index:0;\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a dark F1 cockpit / steering-wheel photo\"><\u002Fimage-slot>\n  <div style=\"position:absolute;inset:0;z-index:1;background:linear-gradient(to top, rgba(8,8,8,0.96) 0%, rgba(8,8,8,0.82) 26%, rgba(8,8,8,0.42) 52%, rgba(8,8,8,0.18) 74%, rgba(8,8,8,0.30) 100%);pointer-events:none;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;right:120px;bottom:104px;z-index:2;display:flex;flex-direction:column;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#CF0090;\">THE OPERATOR VS. THE TOOL<\u002Fdiv>\n    <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:28px 0 0;\"><\u002Fdiv>\n    <h2 style=\"margin:30px 0 0;font-weight:800;font-size:104px;letter-spacing:-0.04em;line-height:0.96;\">Same car. Different driver.<\u002Fh2>\n    <p style=\"margin:26px 0 0;max-width:1180px;font-family:'JetBrains Mono',monospace;font-size:23px;line-height:1.5;letter-spacing:-0.005em;color:#9A9A9A;\">“AI hallucinates.” &nbsp;“It can't do X.” &nbsp;“We've seen it fail at other companies.”<\u002Fp>\n    <p style=\"margin:34px 0 0;max-width:1500px;font-size:33px;line-height:1.36;letter-spacing:-0.015em;color:#E8E8E8;\">Put an automatic-only driver in this car and they spin it into the wall...then tell you why it's undrivable. Put a pro in the same seat, and it's the fastest thing on Earth. Both are correct.<\u002Fp>\n    \n    <div style=\"margin-top:34px;display:flex;align-items:center;gap:22px;\">\n      <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;flex-shrink:0;\"><\u002Fdiv>\n      <p style=\"margin:0;font-weight:700;font-size:40px;line-height:1.05;letter-spacing:-0.02em;color:#CF0090;\">The car you drive in two years is up to you.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#6B6B6B;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>5<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Part 1\" data-speaker-notes=\"Part 1: The Frame. Before we touch code, the map — where we are, where the gains actually live, and why it has to be you.\" style=\"width:100%;height:100%;background:#F2F1EE;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:120px 140px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#6B6B6B;\">Part one<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 44px;\"><\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:800;font-size:150px;letter-spacing:-0.04em;line-height:0.92;\">The frame<\u002Fh2>\n  <p style=\"margin:48px 0 0;max-width:900px;font-size:34px;line-height:1.35;color:#6B6B6B;letter-spacing:-0.01em;\">Introduction to the AI Adoption Continuum, where we currently sit, and how we advance...today.<\u002Fp>\n  <div style=\"margin-top:30px;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.04em;color:#9A9A9A;\">What this answers: where we are, where the gains hide, and why it's on you.<\u002Fdiv>\n  \n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>6<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n\n\n\n\n\n\n<section data-label=\"The Continuum\" data-speaker-notes=\"This is the map. The 95% who see no gains are at Biking and Driving — they bought tools and called it transformation. But Driving is still ground transport: same work, faster. The gains live at Helicopter and beyond — where you cross from better tools to a different process. Not a faster car. A different dimension of movement.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:92px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE AI ADOPTION CONTINUUM<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:44px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:30px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;max-width:1320px;\">Six ways to move. Only some leave the ground.<\u002Fh2>\n\n  <div style=\"position:absolute;left:120px;right:120px;top:392px;\">\n    <div style=\"position:absolute;left:280px;top:4px;width:560px;height:286px;background:rgba(10,10,10,0.04);border-radius:16px;z-index:0;\"><\u002Fdiv>\n    <div style=\"position:absolute;left:280px;top:-28px;width:560px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">95% of teams live here<\u002Fdiv>\n    <div style=\"position:absolute;left:840px;right:0;top:4px;height:286px;background:rgba(207,0,144,0.07);border-radius:16px;z-index:0;\"><\u002Fdiv>\n    <div style=\"position:absolute;left:840px;right:0;top:-28px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;\">THE 10X LIVE HERE<\u002Fdiv>\n    <div style=\"position:absolute;left:840px;top:-26px;width:2px;height:322px;background:repeating-linear-gradient(#CF0090,#CF0090 6px,transparent 6px,transparent 12px);z-index:2;transform:translateX(-1px);\"><\u002Fdiv>\n    <div style=\"position: absolute; left: 831px; top: -54px; transform: translateX(-50%); white-space: nowrap; background: #FAFAFA; padding: 0 12px; font-family: 'JetBrains Mono',monospace; font-size: 14px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #CF0090; z-index: 3\">GROUND&nbsp; &nbsp; &nbsp; &nbsp; AIR<\u002Fdiv>\n    <div style=\"position:relative;z-index:1;display:grid;grid-template-columns:repeat(6,1fr);\">\n      <sc-for list=\"{{ stations }}\" as=\"s\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 12px;\">\n          <div style=\"height:22px;font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:0.18em;text-transform:uppercase;color:#CF0090;margin-bottom:10px;white-space:nowrap;\">{{ s.markerText }}<\u002Fdiv>\n          <div style=\"height:58px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;\">{{ s.icon }}<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;color:{{ s.kicker }};margin-bottom:10px;\">{{ s.num }}<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:29px;letter-spacing:-0.02em;color:{{ s.nameColor }};\">{{ s.name }}<\u002Fdiv>\n          <div style=\"position:relative;width:100%;height:52px;display:flex;align-items:center;justify-content:center;\">\n            <div style=\"position:absolute;left:0;right:0;top:50%;height:2px;background:{{ s.railColor }};transform:translateY(-50%);\"><\u002Fdiv>\n            <div style=\"position:relative;width:{{ s.dot }};height:{{ s.dot }};border-radius:50%;background:{{ s.dotBg }};border:3px solid {{ s.dotBorder }};box-shadow:{{ s.dotShadow }};\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:20px;line-height:1.3;color:#6B6B6B;margin-top:8px;max-width:230px;\">{{ s.desc }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;margin-top:36px;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.22em;text-transform:uppercase;\">\n      <span style=\"color:#B5B5B5;\">Ground — same work, faster<\u002Fspan>\n      <span style=\"color:#CF0090;\">Airborne — a different process<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>7<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Where We Are\" data-speaker-notes=\"Most engineering teams are here today. You've adopted Claude, Copilot, AI-native workflows. That's good — but it's still ground transport. The gains from Driving are real: 10, maybe 20% faster. Not the 10x the solo builders see. The difference isn't talent. It's mode of transport.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:92px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span><span style=\"letter-spacing: 5.6px;\">PLACING THE MAJORITY<\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:44px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:30px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;max-width:1320px;\">We're widely still in the ground transport phase.<\u002Fh2>\n  <p style=\"margin:22px 0 0;max-width:1380px;font-size:30px;line-height:1.34;color:#6B6B6B;letter-spacing:-0.01em;\">Driving gets you <span style=\"color: rgb(10, 10, 10); font-weight: 600;\">~10–20% faster,<\u002Fspan>&nbsp;but not the <span style=\"color: rgb(10, 10, 10); font-weight: 600;\">10×<\u002Fspan> solo builders see. The difference lies in the&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;mode of transport.<\u002Fp>\n  <div style=\"position:absolute;left:120px;right:120px;top:392px;\">\n    <div style=\"display:grid;grid-template-columns:repeat(6,1fr);\">\n      <sc-for list=\"{{ stationsDriving }}\" as=\"s\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 12px;\">\n          <div style=\"height:22px;font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:0.18em;text-transform:uppercase;color:#CF0090;margin-bottom:10px;white-space:nowrap;\">{{ s.markerText }}<\u002Fdiv>\n          <div style=\"height:58px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;\">{{ s.icon }}<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;color:{{ s.kicker }};margin-bottom:10px;\">{{ s.num }}<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:29px;letter-spacing:-0.02em;color:{{ s.nameColor }};\">{{ s.name }}<\u002Fdiv>\n          <div style=\"position:relative;width:100%;height:52px;display:flex;align-items:center;justify-content:center;\">\n            <div style=\"position:absolute;left:0;right:0;top:50%;height:2px;background:{{ s.railColor }};transform:translateY(-50%);\"><\u002Fdiv>\n            <div style=\"position:relative;width:{{ s.dot }};height:{{ s.dot }};border-radius:50%;background:{{ s.dotBg }};border:3px solid {{ s.dotBorder }};box-shadow:{{ s.dotShadow }};\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:20px;line-height:1.3;color:#6B6B6B;margin-top:8px;max-width:230px;\">{{ s.desc }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>8<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The Trust Trap\" data-speaker-notes=\"Here's why the gap persists even when the map is obvious. It's not the tools — it's a loop of doubt that masquerades as good judgment. Before the reps are in you're low-proficiency, so the output disappoints — a hallucination, some slop. Distrust hardens — must be the tool. Confirmation bias sets in — knew I couldn't rely on it — and that's the engine of the whole loop. So you retreat to old ways, which means no reps, which keeps you low. Skepticism reads as rigor; retreat reads as responsibility. Underneath, it's low proficiency and low agency talking. Distrust isn't a verdict on the model — it's a status report on your scaffolding.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:72px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">Why the gap persists<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:28px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:24px 0 0;font-weight:700;font-size:58px;letter-spacing:-0.03em;line-height:1.0;color:#0A0A0A;max-width:1320px;\">What sounds like rigor, is often a <span style=\"color:#CF0090;\">skills gap.<\u002Fspan><\u002Fh2>\n  <p style=\"margin:16px 0 0;font-size:27px;line-height:1.3;letter-spacing:-0.01em;color:#6B6B6B;font-style:italic;\">The most responsible-sounding teams are often the least practiced.<\u002Fp>\n\n  <div style=\"position:absolute;left:96px;right:96px;top:316px;bottom:240px;display:flex;align-items:center;justify-content:center;\">\n    <div style=\"position:relative;width:900px;height:500px;\">\n      <svg width=\"900\" height=\"500\" viewBox=\"0 0 900 500\" fill=\"none\" style=\"position:absolute;inset:0;\">\n        <defs>\n          <marker id=\"trapA\" viewBox=\"0 0 10 10\" refX=\"7\" refY=\"5\" markerWidth=\"6.5\" markerHeight=\"6.5\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"#CF0090\"><\u002Fpath><\u002Fmarker>\n          <marker id=\"trapR\" viewBox=\"0 0 10 10\" refX=\"7\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto-start-reverse\"><path d=\"M0 0L10 5L0 10z\" fill=\"#0A0A0A\"><\u002Fpath><\u002Fmarker>\n        <\u002Fdefs>\n        <circle cx=\"450\" cy=\"250\" r=\"125\" stroke=\"#E0E0E0\" stroke-width=\"1.5\" stroke-dasharray=\"2 9\" stroke-linecap=\"round\"><\u002Fcircle>\n        <path d=\"M478.1 128.2 A 125 125 0 0 1 557.2 185.6\" stroke=\"#CF0090\" stroke-width=\"2.5\" marker-end=\"url(#trapA)\"><\u002Fpath>\n        <path d=\"M574.5 239.1 A 125 125 0 0 1 544.3 332.0\" stroke=\"#CF0090\" stroke-width=\"2.5\" marker-end=\"url(#trapA)\"><\u002Fpath>\n        <path d=\"M498.8 365.1 A 125 125 0 0 1 401.2 365.1\" stroke=\"#CF0090\" stroke-width=\"2.5\" marker-end=\"url(#trapA)\"><\u002Fpath>\n        <path d=\"M355.7 332.0 A 125 125 0 0 1 325.5 239.1\" stroke=\"#CF0090\" stroke-width=\"2.5\" marker-end=\"url(#trapA)\"><\u002Fpath>\n        <path d=\"M342.8 185.6 A 125 125 0 0 1 421.9 128.2\" stroke=\"#0A0A0A\" stroke-width=\"2\" stroke-dasharray=\"2 7\" stroke-linecap=\"round\" marker-end=\"url(#trapR)\"><\u002Fpath>\n        <text x=\"450\" y=\"244\" text-anchor=\"middle\" font-family=\"'JetBrains Mono',monospace\" font-size=\"15\" letter-spacing=\"3\" fill=\"#B5B5B5\">THE DOUBT<\u002Ftext>\n        <text x=\"450\" y=\"270\" text-anchor=\"middle\" font-family=\"'JetBrains Mono',monospace\" font-size=\"15\" letter-spacing=\"3\" fill=\"#B5B5B5\">LOOP<\u002Ftext>\n        <circle cx=\"450\" cy=\"125\" r=\"19\" fill=\"#0A0A0A\" stroke=\"#0A0A0A\" stroke-width=\"1.5\"><\u002Fcircle>\n        <text x=\"450\" y=\"131\" text-anchor=\"middle\" font-family=\"'JetBrains Mono',monospace\" font-size=\"17\" font-weight=\"600\" fill=\"#FFFFFF\" data-comment-anchor=\"a174e94662-text\">1<\u002Ftext>\n        <circle cx=\"568.9\" cy=\"211.4\" r=\"19\" fill=\"#0A0A0A\" stroke=\"#0A0A0A\" stroke-width=\"1.5\"><\u002Fcircle>\n        <text x=\"568.9\" y=\"217.4\" text-anchor=\"middle\" font-family=\"'JetBrains Mono',monospace\" font-size=\"17\" font-weight=\"600\" fill=\"#FFFFFF\">2<\u002Ftext>\n        <circle cx=\"523.5\" cy=\"351.1\" r=\"19\" fill=\"#0A0A0A\" stroke=\"#0A0A0A\" stroke-width=\"1.5\"><\u002Fcircle>\n        <text x=\"523.5\" y=\"357.1\" text-anchor=\"middle\" font-family=\"'JetBrains Mono',monospace\" font-size=\"17\" font-weight=\"600\" fill=\"#FFFFFF\">3<\u002Ftext>\n        <circle cx=\"376.5\" cy=\"351.1\" r=\"19\" fill=\"#CF0090\" stroke=\"#CF0090\" stroke-width=\"1.5\"><\u002Fcircle>\n        <text x=\"376.5\" y=\"357.1\" text-anchor=\"middle\" font-family=\"'JetBrains Mono',monospace\" font-size=\"17\" font-weight=\"600\" fill=\"#fff\">4<\u002Ftext>\n        <circle cx=\"331.1\" cy=\"211.4\" r=\"19\" fill=\"#0A0A0A\" stroke=\"#0A0A0A\" stroke-width=\"1.5\"><\u002Fcircle>\n        <text x=\"331.1\" y=\"217.4\" text-anchor=\"middle\" font-family=\"'JetBrains Mono',monospace\" font-size=\"17\" font-weight=\"600\" fill=\"#FFFFFF\">5<\u002Ftext>\n      <\u002Fsvg>\n      <div style=\"position:absolute;left:450px;top:68px;transform:translate(-50%,-50%);width:300px;text-align:center;font-size:23px;line-height:1.22;letter-spacing:-0.01em;color:#0A0A0A;font-weight:700;\">Low proficiency<br><span style=\"color:#6B6B6B;font-weight:500;font-size:20px;\">before the reps are in<\u002Fspan><\u002Fdiv>\n      <div style=\"position:absolute;left:723px;top:177px;transform:translate(-50%,-50%);width:280px;text-align:center;font-size:23px;line-height:1.22;letter-spacing:-0.01em;color:#0A0A0A;font-weight:700;\">Output disappoints<br><span style=\"color:#6B6B6B;font-weight:500;font-size:20px;\" data-comment-anchor=\"525b9c3e28-span\">a hallucination, some slop<\u002Fspan><\u002Fdiv>\n      <div style=\"position:absolute;left:600px;top:423px;transform:translate(-50%,-50%);width:260px;text-align:center;font-size:23px;line-height:1.22;letter-spacing:-0.01em;color:#0A0A0A;font-weight:700;\">Distrust hardens<br><span style=\"color:#6B6B6B;font-weight:500;font-size:20px;\">must be the tool<\u002Fspan><\u002Fdiv>\n      <div style=\"position:absolute;left:300px;top:423px;transform:translate(-50%,-50%);width:260px;text-align:center;font-size:23px;line-height:1.22;letter-spacing:-0.01em;color:#CF0090;font-weight:700;\">Confirmation bias<br><span style=\"color:#6B6B6B;font-weight:500;font-size:20px;\">knew I couldn't rely on it<\u002Fspan><\u002Fdiv>\n      <div style=\"position:absolute;left:197px;top:177px;transform:translate(-50%,-50%);width:280px;text-align:center;font-size:23px;line-height:1.22;letter-spacing:-0.01em;color:#0A0A0A;font-weight:700;\">Retreat to old ways<br><span style=\"color:#6B6B6B;font-weight:500;font-size:20px;\" data-comment-anchor=\"6a72bff9fe-span\">known beats unknown<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute;left:96px;right:96px;bottom:60px;\">\n    <p style=\"margin:0;font-size:25px;line-height:1.5;letter-spacing:-0.005em;color:#6B6B6B;\">Every stage of this loop masquerades as good judgment; however it is really a signal of low proficiency + low agency.&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; <i>Distrust is a status report on your scaffolding.<\u002Fi><\u002Fp>\n    <p style=\"margin:18px 0 0;font-size:25px;line-height:1.45;letter-spacing:-0.005em;color:#0A0A0A;\">And the hallucination fear assumes the model is always guessing...it isn't. <span style=\"color: rgb(154, 154, 154);\">Hold that thought.<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>9<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"The Shift\" data-speaker-notes=\"This is the shift we're making today. Ground to air. Not about typing faster or better autocomplete — about restructuring how you plan, build, verify, and ship around what AI makes possible. That's Helicopter.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:96px 140px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE SHIFT<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:44px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:30px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;\">Transitioning from ground to air.<\u002Fh2>\n  <p style=\"margin:20px 0 0;max-width:1560px;font-size:30px;line-height:1.34;color:#6B6B6B;letter-spacing:-0.01em;\"><span style=\"color: rgb(10, 10, 10); font-weight: 600;\">Airborne<\u002Fspan> = restructuring how you plan, build, verify, and ship around what AI can do (not \"typing faster\").<\u002Fp>\n  <div style=\"display:flex;align-items:stretch;gap:0;margin-top:44px;\">\n    <div style=\"flex:1;border:1px solid #E6E6E6;border-radius:18px;background:#FFFFFF;padding:48px 52px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.24em;text-transform:uppercase;color:#B5B5B5;margin-bottom:32px;\">Ground transport<\u002Fdiv>\n      <sc-for list=\"{{ shiftGround }}\" as=\"row\" hint-placeholder-count=\"4\">\n        <div style=\"font-size:31px;line-height:1.35;color:#6B6B6B;letter-spacing:-0.01em;padding:16px 0;border-bottom:1px solid #EFEFEF;\">{{ row }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"flex:0 0 96px;display:flex;align-items:center;justify-content:center;\">\n      <svg width=\"56\" height=\"40\" viewBox=\"0 0 56 40\" fill=\"none\" stroke=\"#CF0090\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 20h44\"><\u002Fpath><path d=\"M36 8l14 12-14 12\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <div style=\"flex:1;border:2px solid #CF0090;border-radius:18px;background:#FFF5FB;padding:48px 52px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.24em;text-transform:uppercase;color:#CF0090;margin-bottom:32px;\">Airborne<\u002Fdiv>\n      <sc-for list=\"{{ shiftAir }}\" as=\"row\" hint-placeholder-count=\"4\">\n        <div style=\"font-size:31px;line-height:1.35;color:#0A0A0A;font-weight:600;letter-spacing:-0.01em;padding:16px 0;border-bottom:1px solid #F0D6E8;\">{{ row }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>10<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Why You\" data-speaker-notes=\"Look at who owns each level. Walking through Driving — that's IT. They buy tools and roll them out. But Helicopter is owned by Engineering Leaders. Not the CTO. Not the VP. The people who write the code. The org can't get airborne unless individuals do — and the ones who get there first become the leaders who pull everyone up.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:96px 140px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>WHY US&nbsp;<span style=\"letter-spacing: 5.6px;\">·&nbsp;<\u002Fspan>WHY NOW<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:44px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:30px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;max-width:1300px;\">Only you can fly the helicopter<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:72px;\">\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:44px 40px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#B5B5B5;margin-bottom:24px;\">Walking → Driving<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:42px;letter-spacing:-0.02em;margin-bottom:16px;\">IT<\u002Fdiv>\n      <p style=\"margin:0;font-size:26px;line-height:1.35;color:#6B6B6B;\">Buys the tools. Rolls them out. Provides foundation &amp; infra<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:2px solid #CF0090;border-radius:14px;padding:44px 40px;background:#FFF5FB;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:24px;\">Helicopter<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:42px;letter-spacing:-0.02em;margin-bottom:16px;color:#CF0090;\">Engineering<\u002Fdiv>\n      <p style=\"margin:0;font-size:26px;line-height:1.35;color:#6B6B6B;\">The people who write the code. The org can't get airborne until we do.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:44px 40px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#B5B5B5;margin-bottom:24px;\">Jet → Rocket<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:42px;letter-spacing:-0.02em;margin-bottom:16px;\">CTO / CEO<\u002Fdiv>\n      <p style=\"margin:0;font-size:26px;line-height:1.35;color:#6B6B6B;\">System-wide change — but only after Helicopter is proven.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>11<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n\n\n\n\n\n\n<section data-label=\"Today's Mission\" data-speaker-notes=\"By the end of this deck you'll understand a multi-sprint, self-verifying, autonomous development loop — and have everything you need to run it on your own service. Driving to Helicopter, demystified.\" style=\"width:100%;height:100%;background:#000000;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:120px 160px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#6B6B6B;margin-bottom:48px;\">What you'll walk away with<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin-bottom:56px;\"><\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:800;font-size:128px;letter-spacing:-0.04em;line-height:0.92;max-width:1500px;\">Get<br>airborne.<\u002Fh2>\n  <p style=\"margin:52px 0 0;max-width:1180px;font-size:36px;line-height:1.35;letter-spacing:-0.01em;color:#B5B5B5;\">By the end of this deck you'll understand a multi-sprint, self-verifying, autonomous development loop...and the means to run it yourself.<\u002Fp>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#6B6B6B;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>12<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Part 2\" data-speaker-notes=\"Part 2: The Double Loop. The system that gets you airborne — and you're going to watch it run.\" style=\"width:100%;height:100%;background:#F2F1EE;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:120px 140px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#6B6B6B;\">Part two<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 44px;\"><\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:800;font-size:150px;letter-spacing:-0.04em;line-height:0.92;\">The double loop<\u002Fh2>\n  <p style=\"margin:48px 0 0;max-width:980px;font-size:34px;line-height:1.35;color:#6B6B6B;letter-spacing:-0.01em;\">Some files and a bash script. We'll take it apart piece by piece, and then watch it build an app, unattended.<\u002Fp>\n  <div style=\"margin-top:30px;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.04em;color:#9A9A9A;\">What this answers: what the system is, and how it runs unattended.<\u002Fdiv>\n  \n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>13<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The Insight\" data-speaker-notes=\"Here's the thing nobody tells you about Helicopter. It's not complicated. No framework to install. No platform. No new language. Six files and a bash script. The whole system is legible because every piece does one thing.\" style=\"width:100%;height:100%;background:#000000;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:120px 160px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#6B6B6B;margin-bottom:48px;\">THE OPEN SECRET<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin-bottom:56px;\"><\u002Fdiv><p style=\"margin:0;max-width:1480px;font-weight:700;font-size:76px;line-height:1.12;letter-spacing:-0.03em;\"><span style=\"color: rgb(207, 0, 144);\">Agentic Orchestration<\u002Fspan> is a fancy term,&nbsp; &nbsp; &nbsp; &nbsp; for some <span style=\"color: rgb(207, 0, 144);\">files +&nbsp; a loop.<\u002Fspan><\u002Fp>\n  \n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#6B6B6B;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>14<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Model + Scaffolding\" data-speaker-notes=\"Pre-empt the 'it's just a GPT wrapper' dismissal. The intelligence isn't only the model. It's the model plus the files plus the loop. The model is the engine, the files are the judgment, the loop is the discipline. Take any one away and it stops working — and most of what makes this good lives in the files, not the weights.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">WHERE THE INTELLIGENCE LIVES<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:30px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:28px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;max-width:1500px;\">We're shifting the burden from the model to <span style=\"color: rgb(207, 0, 144);\">specification &amp; scaffolding<\u002Fspan>.<\u002Fh2>\n  <div style=\"flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;\">\n    <div style=\"display:flex;align-items:stretch;gap:26px;\">\n      <div style=\"flex:1;border:1px solid #E6E6E6;border-radius:16px;background:#fff;padding:34px 34px;display:flex;flex-direction:column;gap:10px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">Model<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:34px;letter-spacing:-0.02em;\">The engine<\u002Fdiv>\n        <div style=\"font-size:23px;line-height:1.3;color:#6B6B6B;\">Raw capability. Necessary, but the part everyone talks about.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:0 0 44px;display:flex;align-items:center;justify-content:center;font-size:40px;color:#C4C4C4;font-weight:300;\">+<\u002Fdiv>\n      <div style=\"flex:1;border:2px solid #CF0090;border-radius:16px;background:#FFF5FB;padding:34px 34px;display:flex;flex-direction:column;gap:10px;box-shadow:0 12px 40px rgba(207,0,144,0.10);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;\">Files<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:34px;letter-spacing:-0.02em;\">The judgment<\u002Fdiv>\n        <div style=\"font-size:23px;line-height:1.3;color:#6B6B6B;\">Standards, specs, and memory. Where your engineering lives.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:0 0 44px;display:flex;align-items:center;justify-content:center;font-size:40px;color:#C4C4C4;font-weight:300;\">+<\u002Fdiv>\n      <div style=\"flex:1;border:1px solid #E6E6E6;border-radius:16px;background:#fff;padding:34px 34px;display:flex;flex-direction:column;gap:10px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">Loop<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:34px;letter-spacing:-0.02em;\">The discipline<\u002Fdiv>\n        <div style=\"font-size:23px;line-height:1.3;color:#6B6B6B;\">Build, verify, document (repeat until done).<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:40px;border-top:1px solid #E6E6E6;padding-top:30px;display:flex;align-items:center;gap:22px;\">\n      <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;flex-shrink:0;\"><\u002Fdiv>\n      <p style=\"margin:0;font-size:31px;line-height:1.28;letter-spacing:-0.015em;color:#0A0A0A;\">Take any one away and it stops working. <span style=\"color:#6B6B6B;\">And most of what makes it good isn't the model.&nbsp;It's the files (and what we'll cover in the rest of this deck.)<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>15<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Agentic, Defined\" data-speaker-notes=\"Define the category before the metaphor does the work. Agentic isn't fancy autocomplete. It means the model runs a loop: it sets its own intermediate steps, calls tools, checks its own work, and keeps going until a goal is met — not one prompt, one answer.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">WHAT WE MEAN BY AGENTIC<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:30px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:28px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;max-width:1500px;\">We're going to orchestrate the model to run in a <span style=\"color: rgb(207, 0, 144);\">loop<\u002Fspan>.<\u002Fh2>\n  <p style=\"margin:18px 0 0;max-width:1320px;font-size:28px;line-height:1.34;color:#6B6B6B;letter-spacing:-0.01em;\">Many are still thinking about \"autocomplete\", but they're very different.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:54px;flex:1;min-height:0;\">\n    <div style=\"border:2px solid #CF0090;border-radius:16px;background:#FFF5FB;padding:40px 44px;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(207,0,144,0.10);\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:26px;\">\n        <span style=\"font-size:34px;color:#CF0090;line-height:1;\">↻<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.18em;text-transform:uppercase;color:#CF0090;\">It is — a loop<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:22px;\">\n        <div style=\"font-size:29px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Sets its own intermediate steps<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:29px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Calls tools to act, not just answer<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:29px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Checks its own work<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:29px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>Loops until the goal is met<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E6E6E6;border-radius:16px;background:#fff;padding:40px 44px;display:flex;flex-direction:column;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:26px;\">\n        <span style=\"font-size:30px;color:#B5B5B5;line-height:1;\">→<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9A9A;\">It isn't — a turn<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:22px;\">\n        <div style=\"font-size:29px;line-height:1.3;color:#6B6B6B;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#C4C4C4;font-size:18px;\">○<\u002Fspan><span>Autocomplete on steroids<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:29px;line-height:1.3;color:#6B6B6B;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#C4C4C4;font-size:18px;\">○<\u002Fspan><span>A chatbot you babysit turn by turn<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:29px;line-height:1.3;color:#6B6B6B;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#C4C4C4;font-size:18px;\">○<\u002Fspan><span>“AI that writes code for you,” one prompt at a time<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>16<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Generate vs Call\" data-speaker-notes=\"The keystone, and the thing that actually kills the hallucination fear. The model does two different things. Generate: it produces text from its weights — that's the ONLY place hallucination lives. Call: it emits a structured request, a deterministic system runs it — code, a search, a test — and hands back a fact the model then reads. In a loop, most of the work is tool calls returning ground truth, not the model free-associating. run-qa's Playwright test actually ran in a real browser; the model didn't decide it passed, the test did. That's why you can trust the verdict.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:88px 120px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">TWO THINGS MODELS DO<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:30px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:28px 0 0;font-weight:700;font-size:58px;letter-spacing:-0.03em;line-height:1.0;max-width:1520px;\">It can <span style=\"color: rgb(207, 0, 144);\">generate<\u002Fspan>, or it can <span style=\"color: rgb(207, 0, 144);\">call<\u002Fspan>.<\u002Fh2>\n  <p style=\"margin:18px 0 0;max-width:1360px;font-size:28px;line-height:1.34;color:#6B6B6B;letter-spacing:-0.01em;\">Only one of these can hallucinate. Knowing which is what makes the loop trustworthy.<\u002Fp>\n\n  <div style=\"flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:40px;margin-top:46px;\">\n    <div style=\"border:1px solid #E6E6E6;border-radius:16px;background:#fff;padding:38px 40px;display:flex;flex-direction:column;min-width:0;\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:8px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">Generate<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.04em;color:#9A6B00;background:#FBF3E0;border:1px solid #E8D9A8;border-radius:7px;padding:5px 10px;\">can hallucinate<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-weight:700;font-size:33px;letter-spacing:-0.02em;margin-bottom:16px;\">Text from weights<\u002Fdiv>\n      <div style=\"font-size:25px;line-height:1.36;color:#6B6B6B;\">The model writes the most plausible next tokens from what it learned. Brilliant for synthesis and code — and the <span style=\"color:#0A0A0A;font-weight:600;\">only<\u002Fspan> place a guess can sneak in.<\u002Fdiv>\n      <div style=\"margin-top:auto;padding-top:26px;display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:19px;color:#6B6B6B;\">\n        <span style=\"color:#0A0A0A;\">prompt<\u002Fspan><span style=\"color:#C4C4C4;\">→<\u002Fspan><span style=\"color:#9A9A9A;\">model<\u002Fspan><span style=\"color:#C4C4C4;\">→<\u002Fspan><span style=\"color:#9A6B00;\">plausible text<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:2px solid #CF0090;border-radius:16px;background:#FFF5FB;padding:38px 40px;display:flex;flex-direction:column;min-width:0;box-shadow:0 12px 40px rgba(207,0,144,0.10);\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:8px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;color:#CF0090;\">Call<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.04em;color:#1F8A4C;background:#E9F7EE;border:1px solid #BFE6CC;border-radius:7px;padding:5px 10px;\">returns a fact<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-weight:700;font-size:33px;letter-spacing:-0.02em;margin-bottom:16px;\">A tool runs, for real<\u002Fdiv>\n      <div style=\"font-size:25px;line-height:1.36;color:#6B6B6B;\">The model emits a structured request; a <span style=\"color:#0A0A0A;font-weight:600;\">deterministic<\u002Fspan> system runs it — code, a search, a test — and hands back ground truth the model then reads.<\u002Fdiv>\n      <div style=\"margin-top:auto;padding-top:26px;display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:19px;color:#6B6B6B;flex-wrap:wrap;\">\n        <span style=\"color:#0A0A0A;\">request<\u002Fspan><span style=\"color:#CF0090;\">→<\u002Fspan><span style=\"color:#9A9A9A;\">tool runs<\u002Fspan><span style=\"color:#CF0090;\">→<\u002Fspan><span style=\"color:#1F8A4C;font-weight:600;\">fact<\u002Fspan><span style=\"color:#CF0090;\">→<\u002Fspan><span style=\"color:#0A0A0A;\">model reads<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:32px;border-top:1px solid #E6E6E6;padding-top:26px;display:flex;align-items:center;gap:22px;\">\n    <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;flex-shrink:0;\"><\u002Fdiv>\n    <p style=\"margin:0;font-size:28px;line-height:1.3;letter-spacing:-0.012em;color:#0A0A0A;\">In a loop, most of the work is <span style=\"font-weight: 600;\">tool calls returning ground truth<\u002Fspan>&nbsp;not the model free-associating. <span style=\"color: rgb(107, 107, 107);\">run-qa’s Playwright test actually ran; the model didn’t decide it passed.<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>17<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Primitives\" data-speaker-notes=\"Quick vocabulary before we go deeper — six words you'll hear all afternoon, and everything else is just these arranged. A session is one run of Claude Code, with a fresh memory each time — nothing carries over. The context window is the working memory that session holds at once — it's finite, so when it fills, quality drops; that's why fresh sessions matter. CLAUDE.md is the context file it reads automatically at the start of every session. The Task tool is how one session hands a job to a subagent and gets the result back — it's literally how run-qa calls its three agents. A skill is a reusable procedure Claude can invoke by name, like run-qa. A command is a saved prompt you trigger with a slash, like /review. And a subagent is a scoped helper it spins up for one narrow job, often on a cheaper, faster model. Seven words. Hold onto them — the rest of the hour is just these, wired together.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:92px 140px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE PRIMITIVES<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:24px 0 0;font-weight:700;font-size:54px;letter-spacing:-0.03em;line-height:1.0;max-width:1320px;\">A few words to help speak the language.<\u002Fh2>\n  <p style=\"margin:16px 0 0;max-width:1120px;font-size:28px;line-height:1.35;color:#6B6B6B;letter-spacing:-0.01em;\">New to Claude Code? Everything that follows is just some form of these terms.<\u002Fp>\n  <div style=\"display:flex;flex-direction:column;margin-top:30px;border-top:1px solid #E6E6E6;\">\n    <div style=\"display:grid;grid-template-columns:360px 1fr;align-items:baseline;gap:56px;padding:16px 0;border-bottom:1px solid #EFEFEF;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-weight:500;font-size:31px;letter-spacing:-0.01em;color:#CF0090;\">Session<\u002Fdiv>\n      <div style=\"font-size:28px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">One run of Claude Code. <span style=\"color:#6B6B6B;\">Fresh memory every time.&nbsp;Nothing carries over.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:360px 1fr;align-items:baseline;gap:56px;padding:16px 0;border-bottom:1px solid #EFEFEF;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-weight:500;font-size:31px;letter-spacing:-0.01em;color:#CF0090;\">Context window<\u002Fdiv>\n      <div style=\"font-size:28px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">The working memory a session holds at once. <span style=\"color:#6B6B6B;\">Finite.&nbsp;Fill it and quality drops.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:360px 1fr;align-items:baseline;gap:56px;padding:16px 0;border-bottom:1px solid #EFEFEF;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-weight:500;font-size:31px;letter-spacing:-0.01em;color:#CF0090;\">CLAUDE.md<\u002Fdiv>\n      <div style=\"font-size:28px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">A context file Claude reads <span style=\"color:#6B6B6B;\">automatically at the start of every session.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:360px 1fr;align-items:baseline;gap:56px;padding:16px 0;border-bottom:1px solid #EFEFEF;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-weight:500;font-size:31px;letter-spacing:-0.01em;color:#CF0090;\">Task tool<\u002Fdiv>\n      <div style=\"font-size:28px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">How a session hands a job to a subagent — <span style=\"color:#6B6B6B;\">and gets the result back. It's how <span style=\"font-family:'JetBrains Mono',monospace;font-size:25px;\">run-qa<\u002Fspan> calls its three agents.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:360px 1fr;align-items:baseline;gap:56px;padding:16px 0;border-bottom:1px solid #EFEFEF;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-weight:500;font-size:31px;letter-spacing:-0.01em;color:#CF0090;\">Skill<\u002Fdiv>\n      <div style=\"font-size:28px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">A reusable procedure Claude can invoke by name — <span style=\"color:#6B6B6B;\">like <span style=\"font-family:'JetBrains Mono',monospace;font-size:25px;\">run-qa<\u002Fspan>.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:360px 1fr;align-items:baseline;gap:56px;padding:16px 0;border-bottom:1px solid #EFEFEF;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-weight:500;font-size:31px;letter-spacing:-0.01em;color:#CF0090;\">Command<\u002Fdiv>\n      <div style=\"font-size:28px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">A saved prompt you trigger with a slash — <span style=\"color:#6B6B6B;\">like <span style=\"font-family:'JetBrains Mono',monospace;font-size:25px;\">/review<\u002Fspan>.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:360px 1fr;align-items:baseline;gap:56px;padding:16px 0;border-bottom:1px solid #EFEFEF;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-weight:500;font-size:31px;letter-spacing:-0.01em;color:#CF0090;\">Subagent<\u002Fdiv>\n      <div style=\"font-size:28px;line-height:1.3;color:#0A0A0A;letter-spacing:-0.01em;\">A scoped helper for one narrow job. <span style=\"color:#6B6B6B;\">Often a cheaper, faster model.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>18<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<section data-label=\"The System\" data-speaker-notes=\"That's the whole architecture. Setup is what the system knows before it starts. Actors are who does the work. The orchestrator keeps it moving. Before the details, here's how they fit together.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:96px 140px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>THE SYSTEM<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:44px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:30px 0 0;font-weight:700;font-size:60px;letter-spacing:-0.03em;line-height:1.0;\">Three parts that mirror what we do IRL.<\u002Fh2>\n  <div style=\"display:flex;align-items:center;gap:18px;margin-top:30px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;\">Overview · the three stages<\u002Fspan>\n    <div style=\"display:flex;gap:7px;\">\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#D6D6D6;\"><\u002Fspan>\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#D6D6D6;\"><\u002Fspan>\n      <span style=\"width:44px;height:6px;border-radius:3px;background:#D6D6D6;\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:18px;font-size:24px;line-height:1.3;color:#6B6B6B;letter-spacing:-0.01em;\">This map recurs — the next three slides zoom into one stage each.<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:72px;\">\n    <sc-for list=\"{{ systemCols }}\" as=\"c\" hint-placeholder-count=\"3\">\n      <div style=\"border:1px solid #E6E6E6;border-radius:14px;padding:44px 40px;display:flex;flex-direction:column;height:100%;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;color:#CF0090;margin-bottom:14px;\">{{ c.tag }}<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:40px;letter-spacing:-0.02em;margin-bottom:30px;\">{{ c.title }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:18px;\">\n          <sc-for list=\"{{ c.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n            <div style=\"font-size:27px;line-height:1.3;color:#0A0A0A;display:flex;align-items:baseline;gap:14px;\"><span style=\"color:#CF0090;font-size:18px;\">●<\u002Fspan><span>{{ it }}<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:sp
