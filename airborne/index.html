9px;padding:7px 13px;\"><span style=\"font-size:15px;\">◇<\u002Fspan>approve<\u002Fspan><\u002Fdiv><span style=\"color:#C4C4C4;font-size:20px;flex-shrink:0;\">→<\u002Fspan><div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:-0.005em;color:#0A0A0A;\">build<\u002Fspan><\u002Fdiv><span style=\"color:#C4C4C4;font-size:20px;flex-shrink:0;\">→<\u002Fspan><div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:-0.005em;color:#0A0A0A;\">QA<\u002Fspan><\u002Fdiv><span style=\"color:#C4C4C4;font-size:20px;flex-shrink:0;\">→<\u002Fspan><div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:-0.005em;color:#0A0A0A;\">document<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Zone C: supports -->\n  <div style=\"margin-top:24px;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);gap:36px;flex:1;min-height:0;\">\n    <div style=\"display:flex;flex-direction:column;min-width:0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;margin-bottom:12px;\">The artifact · concrete<\u002Fdiv>\n      <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:22px 28px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.62;color:#D8D8D8;white-space:pre;\"><div><span style=\"color:#7FB0FF;\"># specs/sprint-3.plan.md<\u002Fspan><\u002Fdiv><div>&nbsp;<\u002Fdiv><div><span style=\"color:#9A9A9A;\">files to touch<\u002Fspan> — index.html (hire, cost)<\u002Fdiv><div><span style=\"color:#9A9A9A;\">order<\u002Fspan> — cost formula → guard → UI<\u002Fdiv><div><span style=\"color:#9A9A9A;\">approach<\u002Fspan> — check affordability first<\u002Fdiv><div><span style=\"color:#9A9A9A;\">risks<\u002Fspan> — <span style=\"color:#FF6FC8;\">negative score if unguarded<\u002Fspan><\u002Fdiv><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;justify-content:center;min-width:0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.16em;text-transform:uppercase;color:#9A9A9A;margin-bottom:18px;\">Four files, four jobs<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:14px;font-size:25px;letter-spacing:-0.01em;color:#6B6B6B;\">\n        <div><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;color:#0A0A0A;\">roadmap<\u002Fspan> = state<\u002Fdiv>\n        <div><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;color:#CF0090;font-weight:600;\">plan<\u002Fspan> = <span style=\"color:#0A0A0A;font-weight:600;\">intent<\u002Fspan><\u002Fdiv>\n        <div><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;color:#0A0A0A;\">PROGRESS<\u002Fspan> = memory<\u002Fdiv>\n        <div><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;color:#0A0A0A;\">CLAUDE<\u002Fspan> = learning<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;font-size:21px;line-height:1.32;color:#9A9A9A;letter-spacing:-0.005em;\">A plan is intent — its own slot, not jammed into memory.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:20px;border-top:1px solid #E6E6E6;padding-top:20px;display:flex;align-items:center;gap:20px;\">\n    <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;flex-shrink:0;\"><\u002Fdiv>\n    <p style=\"margin:0;font-size:26px;line-height:1.26;letter-spacing:-0.012em;color:#0A0A0A;\">Judgment moves up a rung — you approve plans instead of writing specs. <span style=\"color:#6B6B6B;\">That's the Jet step.<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>57<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"The Principles\" data-speaker-notes=\"The principles, not the syntax. The commands and flags will change; these don't. Plan before you build. Verify before you call it done. One job per subagent. Fix, don't ask. Promote what you learn. This is the judgment layer — a callback to the disclaimer: this is my way, but the principles travel.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:80px 130px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">Appendix · The principles<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:30px 0 0;\"><\u002Fdiv>\n  <h2 style=\"margin:26px 0 0;font-weight:700;font-size:56px;letter-spacing:-0.03em;line-height:1.0;\">The principles, not the syntax.<\u002Fh2>\n  <p style=\"margin:16px 0 0;max-width:1320px;font-size:26px;line-height:1.32;color:#6B6B6B;letter-spacing:-0.01em;\">Commands and flags change. What makes the output good doesn’t.<\u002Fp>\n  <div style=\"margin-top:24px;\">\n    <div style=\"display:grid;grid-template-columns:60px 1fr;align-items:start;gap:32px;border-top:1px solid #E6E6E6;padding:22px 0;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:600;color:#CF0090;letter-spacing:-0.02em;line-height:1;\">01<\u002Fdiv>\n    <div style=\"font-size:30px;line-height:1.26;letter-spacing:-0.015em;\"><span style=\"font-weight:700;\">Plan before build.<\u002Fspan> <span style=\"color:#6B6B6B;\">Decide the slice and the spec before a line of code.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:60px 1fr;align-items:start;gap:32px;border-top:1px solid #E6E6E6;padding:22px 0;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:600;color:#CF0090;letter-spacing:-0.02em;line-height:1;\">02<\u002Fdiv>\n    <div style=\"font-size:30px;line-height:1.26;letter-spacing:-0.015em;\"><span style=\"font-weight:700;\">Verify before done.<\u002Fspan> <span style=\"color:#6B6B6B;\">“Done” means the gate is GREEN — never a feeling.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:60px 1fr;align-items:start;gap:32px;border-top:1px solid #E6E6E6;padding:22px 0;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:600;color:#CF0090;letter-spacing:-0.02em;line-height:1;\">03<\u002Fdiv>\n    <div style=\"font-size:30px;line-height:1.26;letter-spacing:-0.015em;\"><span style=\"font-weight:700;\">One job per subagent.<\u002Fspan> <span style=\"color:#6B6B6B;\">Narrow scope, cheap model, clean context.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:60px 1fr;align-items:start;gap:32px;border-top:1px solid #E6E6E6;padding:22px 0;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:600;color:#CF0090;letter-spacing:-0.02em;line-height:1;\">04<\u002Fdiv>\n    <div style=\"font-size:30px;line-height:1.26;letter-spacing:-0.015em;\"><span style=\"font-weight:700;\">Fix, don’t ask.<\u002Fspan> <span style=\"color:#6B6B6B;\">On RED, read the failure and patch — stop only when truly stuck.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:60px 1fr;align-items:start;gap:32px;border-top:1px solid #E6E6E6;padding:22px 0;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:600;color:#CF0090;letter-spacing:-0.02em;line-height:1;\">05<\u002Fdiv>\n    <div style=\"font-size:30px;line-height:1.26;letter-spacing:-0.015em;\"><span style=\"font-weight:700;\">Promote learnings.<\u002Fspan> <span style=\"color:#6B6B6B;\">Write durable lessons back into the files so the next run is smarter.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:auto;border-top:1px solid #E6E6E6;padding-top:26px;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.02em;color:#9A9A9A;\">This is my way — the syntax will change, but these don’t.<\u002Fdiv>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>58<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"Making It Run\" data-speaker-notes=\"Appendix, the theory layer. Five ideas sit under the loop. Each one is optional reading and resolves to a file you already ran — nothing here is new machinery, just the why behind what you saw.\" style=\"width:100%;height:100%;background:radial-gradient(circle at 7% 93%, rgba(207,0,144,0.20) 0%, rgba(207,0,144,0) 56%), #0A0A0A;color:#FFFFFF;font-family:'Manrope',sans-serif;padding:120px 140px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#9A9A9A;\">APPENDIX · THE FILES<\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:40px 0 44px;\"><\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:800;font-size:150px;letter-spacing:-0.04em;line-height:0.92;\">Making it run<\u002Fh2>\n  <p style=\"margin:44px 0 0;max-width:1240px;font-size:32px;line-height:1.35;color:#9A9A9A;letter-spacing:-0.01em;\">The key file types for this model, and to run the exercises<\u002Fp>\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>59<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"run.sh\" data-speaker-notes=\"And the orchestrator. Ten lines of bash — dumb on purpose. While there are unchecked boxes, launch a fresh session, check if blocked, repeat. That's the whole system: files plus a dumb loop. Then: let's run it. ./run.sh on the projector.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:60px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · The setup<\u002Fspan><span>File 01 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:26px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:22px 0 24px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:38px;letter-spacing:-0.01em;\">run.sh<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">The orchestrator — the outer loop<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:30px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:20px;line-height:1.5;color:#D8D8D8;white-space:pre;\"><span style=\"color:#6B6B6B;\">#!/usr/bin/env bash<\u002Fspan>\nset -euo pipefail\nMAX=4; n=0\n<span style=\"color:#6B6B6B;\"># planted mode: DEMO_MODE=planted swaps in a buggy build\n# (fixtures/index.sprint2-buggy.html) before Sprint 3 so QA goes RED<\u002Fspan>\n\necho <span style=\"color:#9ED49E;\">\"THE LOOP — starting...\"<\u002Fspan>\ncat roadmap.md\n\n<span style=\"color:#FF6FC8;\">while<\u002Fspan> grep -q <span style=\"color:#9ED49E;\">'^- \\[ \\]'<\u002Fspan> roadmap.md &amp;&amp; (( n &lt; MAX )); <span style=\"color:#FF6FC8;\">do<\u002Fspan>\n  n=$((n+1))\n  echo <span style=\"color:#9ED49E;\">\"SPRINT $n — launching fresh session...\"<\u002Fspan>\n  <span style=\"color:#7FB0FF;\">claude<\u002Fspan> -p <span style=\"color:#9ED49E;\">\"$(cat prompt.md)\"<\u002Fspan> \\\n    --dangerously-skip-permissions \\\n    --model opus \\\n    || { echo <span style=\"color:#9ED49E;\">\"session error\"<\u002Fspan>; break; }\n  cat roadmap.md\n  <span style=\"color:#FF6FC8;\">if<\u002Fspan> grep -q <span style=\"color:#9ED49E;\">'^- \\[!\\]'<\u002Fspan> roadmap.md; <span style=\"color:#FF6FC8;\">then<\u002Fspan>\n    echo <span style=\"color:#9ED49E;\">\"BLOCKED — human needed.\"<\u002Fspan>; break\n  <span style=\"color:#FF6FC8;\">fi<\u002Fspan>\n  echo <span style=\"color:#9ED49E;\">\"Sprint $n complete.\"<\u002Fspan>\n<span style=\"color:#FF6FC8;\">done<\u002Fspan>\n\necho <span style=\"color:#9ED49E;\">\"DONE — $n sprint(s) attempted\"<\u002Fspan>\ncat PROGRESS.md<\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>60<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"CLAUDE.md\" data-speaker-notes=\"This is the broad context — who we are, what we're building, and the definition of done. That one line — not done until run-qa is GREEN — is what makes the whole system work.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:60px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · The setup<\u002Fspan><span>File 02 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:26px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:22px 0 24px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:38px;letter-spacing:-0.01em;\">CLAUDE.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">Broad context — true for every sprint<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:30px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.5;color:#D8D8D8;white-space:pre;\"><span style=\"color:#7FB0FF;\"># Click Farm<\u002Fspan><span style=\"color:#9A9A9A;\">\n\n## Identity &amp; Mission<\u002Fspan>\nYou maintain the Click Farm game. Done = the feature\nworks, QA is GREEN, nothing else broke.<span style=\"color:#9A9A9A;\">\n\n## Map<\u002Fspan>\nOne index.html (inline CSS + JS). State lives in\nlocalStorage. Specs are in specs/.\nState: localStorage key clickfarm = { score, farmhands }.\nStable ids: #score, #harvest, #hire, #farmhands, #cost.<span style=\"color:#9A9A9A;\">\n\n## Conventions<\u002Fspan>\nVanilla HTML/CSS/JS — no frameworks, no build step.\nMobile-first, system fonts, one accent color.<span style=\"color:#9A9A9A;\">\n\n## Running it<\u002Fspan>\nOpen index.html in a browser to play. run-qa to check.\nNo package manager.<span style=\"color:#9A9A9A;\">\n\n## Guardrails<\u002Fspan>\nNever add dependencies or a build tool. Don't edit\nother sprints' specs. Ask before changing the schema.<span style=\"color:#9A9A9A;\">\n\n## Definition of Done\n<\u002Fspan><span style=\"color:#FF6FC8;\">Not done until run-qa returns GREEN.<\u002Fspan>\nIf RED, read it, fix it, re-run. Never ship on RED.<\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>61<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"prompt.md\" data-speaker-notes=\"This is what every session reads first — its marching orders. Same instructions every time. The prompt is the method; the specs are the content.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:60px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · The setup<\u002Fspan><span>File 03 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:26px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:22px 0 24px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:38px;letter-spacing:-0.01em;\">prompt.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">Marching orders — read at every session start<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:30px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:20px;line-height:1.55;color:#D8D8D8;white-space:pre;\"><span style=\"color:#7FB0FF;\"># Sprint Turn<\u002Fspan>\nRead roadmap.md and pick the first sprint marked [ ].\nRead that sprint's spec and PROGRESS.md for context.\n\nBuild the feature per the spec.\nThen run the run-qa skill until GREEN (max 3 attempts).\n\n<span style=\"color:#9A9A9A;\">When GREEN:<\u002Fspan>\n- Mark the sprint [x] in roadmap.md.\n- Append a handoff to PROGRESS.md: what you built,\n  key decisions, gotchas, what the next sprint needs.\n\n<span style=\"color:#9A9A9A;\">If you can't reach GREEN after 3 attempts:<\u002Fspan>\n- Mark the sprint [!] in roadmap.md, then stop.\n\n<span style=\"color:#FF6FC8;\">Updating the status is your final action — never skip it.<\u002Fspan><\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>62<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<section data-label=\"roadmap.md\" data-speaker-notes=\"This is the manifest. Four unchecked boxes — that's our state machine. The orchestrator reads it to know if there's work left; the Builder reads it to know what to pick up. The checkbox ticks after each sprint.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:60px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · The setup<\u002Fspan><span>File 04 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:26px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:22px 0 24px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:38px;letter-spacing:-0.01em;\">roadmap.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">The manifest — three characters per line<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:34px 38px;overflow:hidden;display:flex;flex-direction:column;justify-content:center;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:23px;line-height:2.0;color:#D8D8D8;white-space:pre;\"><span style=\"color:#7FB0FF;\"># Click Farm — Roadmap<\u002Fspan>\n\n- [ ] Sprint 1: Core clicker — harvest + persistent score    <span style=\"color:#6B6B6B;\">— specs/sprint-1.md<\u002Fspan>\n- [ ] Sprint 2: Farmhands — buy auto-harvesters             <span style=\"color:#6B6B6B;\">— specs/sprint-2.md<\u002Fspan>\n- [ ] Sprint 3: Scaling cost — price curve + spend guard    <span style=\"color:#6B6B6B;\">— specs/sprint-3.md<\u002Fspan>\n- [ ] Sprint 4: Polish — number formatting + click pulse    <span style=\"color:#6B6B6B;\">— specs/sprint-4.md<\u002Fspan><\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>63<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"roadmap.md · scaled\" data-speaker-notes=\"Same file, at scale. Four flat boxes don't cut it for a real project — but the same checkbox manifest does the job; it just nests. Epics are milestones; Sprints live inside them, each pointing at one spec; Features sit inside a Sprint. The top is a dashboard, one row per Epic. A gate can be a human checkpoint, not just code — the loop stops and waits. And the Current Status block at the bottom is the living handoff, rewritten at the end of every session. Same three-character state machine, same single file.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:60px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · Scaling up<\u002Fspan><span>roadmap.md, at scale<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:26px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:22px 0 24px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:38px;letter-spacing:-0.01em;\">roadmap.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">One file, nested — Epics → Sprints → Features<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;min-height:0;display:grid;grid-template-columns:1.32fr 1fr;gap:40px;\">\n    <div style=\"background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:30px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.62;color:#D8D8D8;white-space:pre;\"><span style=\"color:#7FB0FF;\"># Click Farm — Roadmap<\u002Fspan>\n\n<span style=\"color:#9A9A9A;\">## Epics<\u002Fspan>  <span style=\"color:#CF0090;\">«1»<\u002Fspan>\n- [x] E1  Core game       <span style=\"color:#6B6B6B;\">shipped<\u002Fspan>\n- [ ] E2  AI Bridge       <span style=\"color:#E78FCF;\">active<\u002Fspan>\n- [ ] E3  Multiplayer     <span style=\"color:#6B6B6B;\">planned<\u002Fspan>\n\n<span style=\"color:#9A9A9A;\">## Epic 2 · AI Bridge<\u002Fspan>  <span style=\"color:#CF0090;\">«2»<\u002Fspan>\n- [x] S1  Tool library        <span style=\"color:#6B6B6B;\">epic2/sprint1-tools.md<\u002Fspan>\n- [ ] S2  Command-mode UI      <span style=\"color:#6B6B6B;\">epic2/sprint2-command.md<\u002Fspan>\n- [ ] S3  Multi-intent parse   <span style=\"color:#6B6B6B;\">epic2/sprint3-intents.md<\u002Fspan>\n  <span style=\"color:#7A7A7A;\">gate:<\u002Fspan> Epic 1 stable + dogfooded 1 week   <span style=\"color:#CF0090;\">«3»<\u002Fspan>\n\n<span style=\"color:#9A9A9A;\">## Current Status<\u002Fspan>  <span style=\"color:#CF0090;\">«4»<\u002Fspan>\nActive   E2 · S2 — Command-mode UI\nShipped  E2 · S1 — tool library, tests green\nNext     Command-mode UI -&gt; multi-intent\nGate     2-week dogfood window before E3<\u002Fpre>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;justify-content:center;gap:18px;\">\n      <div style=\"display:grid;grid-template-columns:34px 1fr;align-items:start;gap:16px;\">\n        <span style=\"width:34px;height:34px;border-radius:50%;background:#CF0090;color:#fff;font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;display:flex;align-items:center;justify-content:center;\">1<\u002Fspan>\n        <div style=\"font-size:23px;line-height:1.3;letter-spacing:-0.01em;\"><span style=\"font-weight:700;\">Epic dashboard.<\u002Fspan> <span style=\"color:#6B6B6B;\">One row per epic — the bird's-eye view at a glance.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:34px 1fr;align-items:start;gap:16px;\">\n        <span style=\"width:34px;height:34px;border-radius:50%;background:#CF0090;color:#fff;font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;display:flex;align-items:center;justify-content:center;\">2<\u002Fspan>\n        <div style=\"font-size:23px;line-height:1.3;letter-spacing:-0.01em;\"><span style=\"font-weight:700;\">Same checkboxes, nested.<\u002Fspan> <span style=\"color:#6B6B6B;\">Epics → Sprints → Features. Each sprint still points at one spec.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:34px 1fr;align-items:start;gap:16px;\">\n        <span style=\"width:34px;height:34px;border-radius:50%;background:#CF0090;color:#fff;font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;display:flex;align-items:center;justify-content:center;\">3<\u002Fspan>\n        <div style=\"font-size:23px;line-height:1.3;letter-spacing:-0.01em;\"><span style=\"font-weight:700;\">A gate can be human.<\u002Fspan> <span style=\"color:#6B6B6B;\">Not just code — the loop stops and waits for a checkpoint.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:34px 1fr;align-items:start;gap:16px;\">\n        <span style=\"width:34px;height:34px;border-radius:50%;background:#CF0090;color:#fff;font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;display:flex;align-items:center;justify-content:center;\">4<\u002Fspan>\n        <div style=\"font-size:23px;line-height:1.3;letter-spacing:-0.01em;\"><span style=\"font-weight:700;\">The living handoff.<\u002Fspan> <span style=\"color:#6B6B6B;\">Current Status is rewritten at the end of every session.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>64<\u002Fspan><\u002Fdiv>\n<\u002Fsection><section data-label=\"PROGRESS.md\" data-speaker-notes=\"Starts empty. The Builder appends a handoff after each sprint — what it built, key decisions, gotchas, what the next session needs to know. This is how memory carries across fresh sessions.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:60px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · The setup<\u002Fspan><span>File 05 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:26px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:22px 0 24px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:38px;letter-spacing:-0.01em;\">PROGRESS.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">The memory — the Builder writes it, sprint by sprint<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:34px 38px;overflow:hidden;display:flex;flex-direction:column;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:24px;line-height:1.6;color:#D8D8D8;white-space:pre;\"><span style=\"color:#7FB0FF;\"># Progress Log<\u002Fspan><\u002Fpre>\n    <div style=\"margin-top:24px;font-family:'JetBrains Mono',monospace;font-size:20px;line-height:1.5;color:#6B6B6B;\">// starts empty — one handoff entry appended per sprint:\n// what was built · key decisions · gotchas · next-up<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>65<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n<section data-label=\"sprint-1.md\" data-speaker-notes=\"This is the specific context for the first sprint — this is where your brain matters. A good spec makes the build trivial. In the demo, Sprint 1 is the one-shot: it reads this, writes index.html, runs QA, goes GREEN, and you open a working click farm in the browser.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:56px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · The setup<\u002Fspan><span>File 06 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:24px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:20px 0 22px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:36px;letter-spacing:-0.01em;\">specs/sprint-1.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">Core clicker<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:28px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:19px;line-height:1.5;color:#D8D8D8;white-space:pre;\"><span style=\"color:#7FB0FF;\"># Sprint 1: Core Clicker\n\n<\u002Fspan><span style=\"color:#9A9A9A;\">## What to build<\u002Fspan>\nA big Harvest button. Clicking it adds 1 to the\nscore. Score persists across reloads.\n\n<span style=\"color:#9A9A9A;\">## Acceptance Criteria<\u002Fspan>\n- Clicking <span style=\"color:#E78FCF;\">#harvest<\u002Fspan> increases <span style=\"color:#E78FCF;\">#score<\u002Fspan> by 1\n- <span style=\"color:#E78FCF;\">#score<\u002Fspan> persists after a reload (localStorage)\n- Score is a non-negative integer\n\n<span style=\"color:#9A9A9A;\">## Technical Notes<\u002Fspan>\n- Single index.html, inline CSS + JS\n- localStorage key \"clickfarm\" → { score, farmhands }\n- Stable ids: #score, #harvest<\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>66<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"sprint-2.md\" data-speaker-notes=\"Sprint 2 — adding farmhands. The loop continues automatically; it reads this spec and adds the hire button plus the auto-harvest tick. Refresh the browser and farmhands are earning on their own. A visible change, no human input.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:56px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · The setup<\u002Fspan><span>File 07 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:24px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:20px 0 22px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:36px;letter-spacing:-0.01em;\">specs/sprint-2.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">Farmhands — buy auto-harvesters<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:28px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:19px;line-height:1.5;color:#D8D8D8;white-space:pre;\"><span style=\"color:#7FB0FF;\"># Sprint 2: Farmhands (auto-harvest)\n\n<\u002Fspan><span style=\"color:#9A9A9A;\">## What to build<\u002Fspan>\nA \"Hire Farmhand\" button (cost 10). Hiring deducts\n10 and adds a farmhand. Each farmhand earns\n+1 score/sec automatically.\n\n<span style=\"color:#9A9A9A;\">## Acceptance Criteria<\u002Fspan>\n- <span style=\"color:#E78FCF;\">#hire<\u002Fspan> with score ≥ 10 deducts 10 and adds a <span style=\"color:#E78FCF;\">#farmhands<\u002Fspan>\n- With ≥1 farmhand, <span style=\"color:#E78FCF;\">#score<\u002Fspan> rises ~1/sec on its own\n- <span style=\"color:#E78FCF;\">#cost<\u002Fspan> shows the hire cost (10)\n\n<span style=\"color:#9A9A9A;\">## Technical Notes<\u002Fspan>\n- New ids: #hire, #farmhands, #cost\n- setInterval 1000ms; persist state on each tick<\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>67<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"sprint-3.md\" data-speaker-notes=\"Sprint 3 — this is where it gets interesting. The hire flow is a classic bug source: hire a farmhand you can't afford and the score goes negative. For the demo the bug is planted via a fixture swap, so QA reliably goes RED on the hire test — then the Builder reads the failure, fixes it, and re-runs to GREEN. That's the inner loop, live.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:56px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · The setup<\u002Fspan><span>File 08 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:24px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:20px 0 22px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:36px;letter-spacing:-0.01em;\">specs/sprint-3.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#CF0090;letter-spacing:-0.01em;font-weight:600;\">Scaling cost — QA catches the bug<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:28px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.5;color:#D8D8D8;white-space:pre;\"><span style=\"color:#7FB0FF;\"># Sprint 3: Scaling Cost\n\n<\u002Fspan><span style=\"color:#9A9A9A;\">## What to build<\u002Fspan>\nFarmhands get more expensive the more you own.\ncost = floor(10 * 1.15 ^ farmhands). <span style=\"color:#E78FCF;\">#cost<\u002Fspan>\nshows the NEXT price, updates after each hire.\n\n<span style=\"color:#9A9A9A;\">## Acceptance Criteria<\u002Fspan>\n- <span style=\"color:#E78FCF;\">#cost<\u002Fspan> increases after each hire (per the formula)\n- When score &lt; cost, clicking <span style=\"color:#E78FCF;\">#hire<\u002Fspan> does nothing\n  (score &amp; farmhands unchanged)\n- Score never goes negative; hiring at score == cost succeeds\n\n<span style=\"color:#9A9A9A;\">## Technical Notes<\u002Fspan>\n- Integer math, Math.floor\n<span style=\"color:#FF6FC8;\">- Guard lives in the acceptance test; the bug is\n  planted via the fixture swap, not the spec<\u002Fspan><\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>68<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"sprint-4.md\" data-speaker-notes=\"Sprint 4 — polish, if time allows. Number formatting and a click pulse. In the demo we usually stop after the Sprint 3 RED-to-GREEN; this one is here for the hands-on round.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:56px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · The setup<\u002Fspan><span>File 09 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:24px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:20px 0 22px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:36px;letter-spacing:-0.01em;\">specs/sprint-4.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">Polish — formatting + feedback<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:28px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:19px;line-height:1.5;color:#D8D8D8;white-space:pre;\"><span style=\"color:#7FB0FF;\"># Sprint 4: Polish\n\n<\u002Fspan><span style=\"color:#9A9A9A;\">## What to build<\u002Fspan>\nNumber formatting + click feedback.\n\n<span style=\"color:#9A9A9A;\">## Acceptance Criteria<\u002Fspan>\n- Score ≥ 1000 shows abbreviated (1.2K / 3.4M / 5.6B);\n  below 1000 shows the integer\n- Same formatting on <span style=\"color:#E78FCF;\">#cost<\u002Fspan>\n- Underlying state stays an exact integer (display-only)\n- <span style=\"color:#E78FCF;\">#harvest<\u002Fspan> pulses briefly on click\n\n<span style=\"color:#9A9A9A;\">## Technical Notes<\u002Fspan>\n- Format on display only — never round the stored value<\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>69<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n<section data-label=\"SKILL.md\" data-speaker-notes=\"This is the bridge. One call — run-qa — runs all three QA agents in sequence and returns a single verdict, GREEN or RED. If RED, fix the reported issues and re-run, max three attempts, then stop and hand to a human.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:56px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · QA agents<\u002Fspan><span>File 10 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:24px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:20px 0 22px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:34px;letter-spacing:-0.01em;\">.claude/skills/run-qa/SKILL.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">run-qa — the quality gate<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:28px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:19px;line-height:1.5;color:#D8D8D8;white-space:pre;\"><span style=\"color:#6B6B6B;\">---<\u002Fspan>\n<span style=\"color:#9ED49E;\">name:<\u002Fspan> run-qa\n<span style=\"color:#9ED49E;\">description:<\u002Fspan> Full QA pass — lint, review, e2e.\n  Returns one GREEN/RED verdict.\n<span style=\"color:#6B6B6B;\">---<\u002Fspan>\n\n<span style=\"color:#7FB0FF;\"># run-qa<\u002Fspan>\nRun these in order. Each is a subagent; use its\nreturned message as the result.\n\n1. Delegate to <span style=\"color:#FF6FC8;\">linter<\u002Fspan>.\n2. Delegate to <span style=\"color:#FF6FC8;\">code-reviewer<\u002Fspan>.\n3. Delegate to <span style=\"color:#FF6FC8;\">playwright-tester<\u002Fspan>.\n\n<span style=\"color:#9A9A9A;\">Verdict:<\u002Fspan>\n- Any lint error, any CRITICAL finding, or any\n  failed spec → RED. List what failed.\n- Otherwise → GREEN.\n\nIf RED: fix the issues, re-run from step 1.\nStop after 3 attempts; then report to the human.<\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>70<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"linter.md\" data-speaker-notes=\"The first QA specialist. Checks the HTML is well-formed and the inline JS parses. Auto-fixes trivial formatting; reports anything that needs a judgment call. Runs on a cheaper, faster model — it just needs to check.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:56px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · QA agents<\u002Fspan><span>File 11 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:24px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:20px 0 22px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:34px;letter-spacing:-0.01em;\">.claude/agents/linter.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">Subagent 1 — structure &amp; syntax<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:28px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:19px;line-height:1.5;color:#D8D8D8;white-space:pre;\"><span style=\"color:#6B6B6B;\">---<\u002Fspan>\n<span style=\"color:#9ED49E;\">name:<\u002Fspan> linter\n<span style=\"color:#9ED49E;\">description:<\u002Fspan> Validates HTML structure and JS errors.\n<span style=\"color:#9ED49E;\">tools:<\u002Fspan> Read, Edit, Bash    <span style=\"color:#9ED49E;\">model:<\u002Fspan> haiku\n<span style=\"color:#6B6B6B;\">---<\u002Fspan>\n\nRun validation on index.html:\n1. Check HTML is well-formed (tags, nesting)\n2. Run node --check on inline script content\n3. Check for unclosed strings, missing semicolons,\n   undefined variables\n\nAuto-fix trivial violations (formatting, whitespace).\nFor judgment calls, leave it and report it.\n\nReturn \"CLEAN\" if no errors remain, else the list\nof remaining errors with location.<\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>71<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"code-reviewer.md\" data-speaker-notes=\"The second specialist. Read-only — it never changes files. Looks for logic bugs, especially around localStorage read/write, and missing acceptance criteria. Returns findings as CRITICAL, WARN, or NIT. A CRITICAL is what turns the verdict RED.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:56px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · QA agents<\u002Fspan><span>File 12 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:24px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:20px 0 22px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:34px;letter-spacing:-0.01em;white-space:nowrap;\">.claude/agents/code-reviewer.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">Subagent 2 — bugs &amp; logic<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:28px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:19px;line-height:1.5;color:#D8D8D8;white-space:pre;\"><span style=\"color:#6B6B6B;\">---<\u002Fspan>\n<span style=\"color:#9ED49E;\">name:<\u002Fspan> code-reviewer\n<span style=\"color:#9ED49E;\">description:<\u002Fspan> Reviews changes for bugs and UX issues.\n<span style=\"color:#9ED49E;\">tools:<\u002Fspan> Read, Grep, Glob    <span style=\"color:#9ED49E;\">model:<\u002Fspan> sonnet\n<span style=\"color:#6B6B6B;\">---<\u002Fspan>\n\nReview index.html against the sprint spec.\nDo not change any files.\n\nCheck for:\n- Logic bugs (especially localStorage read/write)\n- State issues (stale data, race conditions)\n- UX problems (unaffordable hires, negative balances)\n- Missing acceptance criteria\n\nReturn findings as:\n<span style=\"color:#FF6FC8;\">- CRITICAL<\u002Fspan> — bugs, data corruption, broken function\n- WARN — likely problems, edge cases\n- NIT  — style, naming\nFor each: the issue + a one-line fix. Else \"CLEAN\".<\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>72<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"playwright-tester.md\" data-speaker-notes=\"The third specialist. Writes and runs a Playwright test against the acceptance criteria. For Sprint 3 it specifically checks the hire flow — try to hire a farmhand you can't afford, confirm it's blocked and the score never goes below zero. That's the test that catches the bug. Returns GREEN, or RED with enough detail to fix it.\" style=\"width:100%;height:100%;background:#FAFAFA;color:#0A0A0A;font-family:'Manrope',sans-serif;padding:56px 96px;display:flex;flex-direction:column;box-sizing:border-box;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#B5B5B5;\">\n    <span>Appendix · QA agents<\u002Fspan><span>File 13 / 13<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"width:56px;height:5px;background:#CF0090;border-radius:2px;margin:24px 0 0;\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:baseline;gap:24px;margin:20px 0 22px;\">\n    <h2 style=\"margin:0;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:30px;letter-spacing:-0.01em;white-space:nowrap;\">.claude/agents/playwright-tester.md<\u002Fh2>\n    <span style=\"font-size:23px;color:#6B6B6B;letter-spacing:-0.01em;\">Subagent 3 — behavior &amp; acceptance<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;background:#0E0E0E;border:1px solid #232323;border-radius:14px;padding:28px 36px;overflow:hidden;\">\n<pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.48;color:#D8D8D8;white-space:pre;\"><span style=\"color:#6B6B6B;\">---<\u002Fspan>\n<span style=\"color:#9ED49E;\">name:<\u002Fspan> playwright-tester\n<span style=\"color:#9ED49E;\">description:<\u002Fspan> Runs behavioral tests against the app.\n<span style=\"color:#9ED49E;\">tools:<\u002Fspan> Read, Write, Bash    <span style=\"color:#9ED49E;\">model:<\u002Fspan> sonnet\n<span style=\"color:#6B6B6B;\">---<\u002Fspan>\n\nWrite and run a Playwright test for the sprint's\nacceptance criteria.\n1. Create test-farm.spec.js from the sprint spec\n2. Open index.html via file:// or a local server\n3. Test each acceptance criterion\n\n<span style=\"color:#9A9A9A;\">Key scenarios for Sprint 3:<\u002Fspan>\n- Click → score increments\n- Hire with enough score → cost deducted, +1 farmhand\n<span style=\"color:#FF6FC8;\">- Hire when you can't afford it → blocked, no change<\u002Fspan>\n- Hire at score == cost → succeeds, score ≥ 0\n- Score never goes below 0\n- State persists across refresh\n\nReturn \"GREEN\" if all pass, else \"RED\" plus, per\nfailure: test name, failed assertion, actual result.<\u002Fpre>\n  <\u002Fdiv>\n\n  <div data-deck-footer=\"\" style=\"position:absolute;left:56px;right:56px;bottom:22px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#B5B5B5;pointer-events:none;z-index:5;\"><span>github.com/rishidean/tutorials-agent-loop&nbsp;&nbsp;·&nbsp;&nbsp;Self-paced<\u002Fspan><span>73<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080}}\">\nclass Component extends DCLogic {\n  makeIcon(key, color) {\n    const raw = {\n      walk: '<circle cx=\"12\" cy=\"4\" r=\"2\"/><path d=\"M12 6v6\"/><path d=\"m12 12-3 8\"/><path d=\"m12 12 2.5 4 1.5 4\"/><path d=\"m7.5 10 4.5 2 4.5-2.5\"/>',\n      bike: '<circle cx=\"18.5\" cy=\"17.5\" r=\"3.5\"/><circle cx=\"5.5\" cy=\"17.5\" r=\"3.5\"/><circle cx=\"15\" cy=\"5\" r=\"1\"/><path d=\"M12 17.5V14l-3-3 4-3 2 3h2\"/>',\n      car: '<path d=\"M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.8A2 2 0 0 0 2 14v2c0 .6.4 1 1 1h2\"/><circle cx=\"7\" cy=\"17\" r=\"2\"/><circle cx=\"17\" cy=\"17\" r=\"2\"/>',\n      heli: '<path d=\"M3 6h18\"/><path d=\"M12 4v2\"/><path d=\"M5 14a5 5 0 0 1 5-4h3l5 3.2a1 1 0 0 1-.5 1.8H6a1 1 0 0 1-1-1Z\"/><path d=\"M17.5 12.5 21 11\"/><path d=\"M9 18h6\"/><path d=\"M12 15v3\"/>',\n      jet: '<path d=\"M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.4-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.8.5-1.2Z\"/>',\n      rocket: '<path d=\"M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z\"/><path d=\"m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z\"/><path d=\"M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0\"/><path d=\"M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5\"/>',\n    };\n    return React.createElement('svg', {\n      width: 52, height: 52, viewBox: '0 0 24 24', fill: 'none', stroke: color,\n      strokeWidth: 1.75, strokeLinecap: 'round', strokeLinejoin: 'round',\n      dangerouslySetInnerHTML: { __html: raw[key] || '' },\n    });\n  }\n  buildStations(hereIndex) {\n    const ground = { kicker: '#B5B5B5', nameColor: '#0A0A0A', dotBg: '#FAFAFA', dotBorder: '#B5B5B5', dotShadow: 'none', dot: '18px' };\n    const air = { kicker: '#CF0090', nameColor: '#0A0A0A', dotBg: '#FAFAFA', dotBorder: '#CF0090', dotShadow: 'none', dot: '18px' };\n    const here = { kicker: '#CF0090', nameColor: '#CF0090', dotBg: '#CF0090', dotBorder: '#CF0090', dotShadow: '0 0 0 9px rgba(207,0,144,0.14)', dot: '26px' };\n    const base = [\n      { num: '01', name: 'Walking',    desc: 'Chat tools',            air: false, key: 'walk' },\n      { num: '02', name: 'Biking',     desc: 'Autocomplete',          air: false, key: 'bike' },\n      { num: '03', name: 'Driving',    desc: 'Agent coding',          air: false, key: 'car' },\n      { num: '04', name: 'Helicopter', desc: 'Agent harness',         air: true,  key: 'heli' },\n      { num: '05', name: 'Jet',        desc: 'SDLC transformation',   air: true,  key: 'jet' },\n      { num: '06', name: 'Rocket',     desc: 'Autonomous agents',     air: true,  key: 'rocket' },\n    ];\n    return base.map((s, i) => {\n      const isHere = i === hereIndex;\n      const style = isHere ? here : (s.air ? air : ground);\n      return {\n        ...s, ...style,\n        icon: this.makeIcon(s.key, s.air ? '#CF0090' : '#5A5A5A'),\n        railColor: s.air ? '#CF0090' : '#E6E6E6',\n        markerText: isHere ? 'You are here ↓' : '',\n      };\n    });\n  }\n  navTo(label) {\n    try {\n      const stage = document.querySelector('deck-stage');\n      const secs = Array.from(document.querySelectorAll('section[data-label]'));\n      const idx = secs.findIndex(function (s) { return s.getAttribute('data-label') === label; });\n      if (stage && idx >= 0 && typeof stage.goTo === 'function') stage.goTo(idx);\n    } catch (e) {}\n  }\n  renderVals() {\n    return {\n      navPart1: () => this.navTo('Part 1'),\n      navPart2: () => this.navTo('Part 2'),\n      navPart3: () => this.navTo('Your Turn'),\n      navPart4: () => this.navTo('Part 4'),\n      navWhyItWorks: () => this.navTo('Why It Works'),\n      navExtending: () => this.navTo('Extending This Model'),\n      navMakingItRun: () => this.navTo('Making It Run'),\n      stations: this.buildStations(-1),\n      stationsDriving: this.buildStations(2),\n      stationsHeli: this.buildStations(3),\n      iconHeli: this.makeIcon('heli', '#CF0090'),\n      iconJet: this.makeIcon('jet', '#CF0090'),\n      iconRocket: this.makeIcon('rocket', '#CF0090'),\n      shiftGround: ['Better tools', 'Same workflow, faster', 'You write code with AI help', 'Incremental'],\n      shiftAir: ['Different process', 'A new workflow entirely', 'AI writes code, you write specs', 'Transformational'],\n      systemCols: [\n        { tag: 'Setup', title: 'What it knows', items: ['Tech Lead', 'PM', 'Design', 'QA Lead'] },\n        { tag: 'Actors', title: 'Who does the work', items: ['The Builder', 'QA Team (x3)', 'QA Manager'] },\n        { tag: 'Orchestrator', title: 'What keeps it moving', items: ['Eng Manager', 'PM'] },\n      ],\n      builderSteps: [\n        { verb: 'Reads', text: 'Broad context, the spec, and the manifest.', border: 'border-right:1px solid #E6E6E6;' },\n        { verb: 'Does', text: 'Builds the feature for this one sprint.', border: 'border-right:1px solid #E6E6E6;padding-left:36px;' },\n        { verb: 'Then', text: 'Invokes QA on its own work.', border: 'border-right:1px solid #E6E6E6;padding-left:36px;' },\n        { verb: 'Finally', text: 'Updates the manifest, writes a handoff note.', border: 'padding-left:36px;' },\n      ],\n      epics: [\n        { num: '0', theme: 'Setup', goal: 'Schema, scaffold, environment — a standing skeleton', status: 'Done', statusColor: '#1F8A4C', dotBg: '#1F8A4C' },\n        { num: '1', theme: 'Core CRUD', goal: 'Read/write every entity through the UI', status: 'Done', statusColor: '#1F8A4C', dotBg: '#1F8A4C' },\n        { num: '2', theme: 'AI Bridge', goal: 'Every operation agent-callable; command-mode UX', status: 'Active', statusColor: '#CF0090', dotBg: '#CF0090' },\n        { num: '3', theme: 'Memory & Context', goal: 'Cross-session memory, layered context, a learning loop', status: 'Not started', statusColor: '#B5B5B5', dotBg: '#FAFAFA' },\n      ],\n      artifacts: [\n        { path: 'docs/vision.md', status: 'Done', statusColor: '#1F8A4C', dotBg: '#1F8A4C' },\n        { path: 'docs/specs/flows.md', status: 'Done', statusColor: '#1F8A4C', dotBg: '#1F8A4C' },\n        { path: 'db/schema.yaml', status: 'Done', statusColor: '#1F8A4C', dotBg: '#1F8A4C' },\n        { path: 'design/prototype/', status: 'Done', statusColor: '#1F8A4C', dotBg: '#1F8A4C' },\n        { path: 'docs/specs/architecture.md', status: 'Active', statusColor: '#CF0090', dotBg: '#CF0090' },\n      ],\n      qaCrew: [\n        { mark: '{ }', name: 'Linter', job: 'Formatting & style.', model: 'haiku', file: '.claude/agents/linter.md',\n          snippet: 'name: linter\\ntools: Read, Edit, Bash\\nmodel: haiku\\n---\\n1. HTML well-formed?\\n2. node --check inline JS\\n3. unclosed strings, undef vars\\n→ \"CLEAN\" or error list' },\n        { mark: '✓', name: 'Code reviewer', job: 'Bugs & security — read-only.', model: 'sonnet', file: '.claude/agents/code-reviewer.md',\n          snippet: 'name: code-reviewer\\ntools: Read, Grep, Glob\\n---\\nReview vs spec · read-only\\nlogic bugs · stale state\\nmissing criteria\\n→ CRITICAL / WARN / NIT' },\n        { mark: '▶', name: 'E2E tester', job: 'Behavior & acceptance criteria.', model: 'sonnet', file: '.claude/agents/playwright-tester.md',\n          snippet: 'name: playwright-tester\\ntools: Read, Write, Bash\\n---\\nWrite + run Playwright test\\nunaffordable hire → blocked\\nnever below 0\\n→ \"GREEN\" or \"RED\" + details' },\n      ],\n      changedFrom: ['You write code with AI help', 'You review every line', 'Quality = your eyeballs', 'One session, one task', 'You are the builder'],\n      changedTo: ['AI writes code, you write specs', 'You review at checkpoints', 'Quality = automated QA crew', 'Multi-session, memory, continuity', 'You are the architect'],\n      accel: [\n        { span: 'Years', label: 'Walking → Biking', flex: '4', h: '230px', bg: '#EDEDED', fg: '#6B6B6B' },\n        { span: 'A year', label: 'Biking → Driving', flex: '2.4', h: '168px', bg: '#E2E2E2', fg: '#6B6B6B' },\n        { span: 'Months', label: 'Driving → Helicopter', flex: '1.3', h: '120px', bg: '#F3B4DE', fg: '#0A0A0A' },\n        { span: 'Now', label: 'Helicopter → Jet', flex: '0.8', h: '78px', bg: '#CF0090', fg: '#CF0090' },\n      ],\n      timeline: [\n        { leap: 'Walking → Biking', when: '~1 year · 2024', bar: '300px', barColor: '#DADADA', color: '#6B6B6B', size: '40px' },\n        { leap: 'Biking → Driving', when: '~6 months · early 2025', bar: '150px', barColor: '#B5B5B5', color: '#6B6B6B', size: '40px' },\n        { leap: 'Driving → Helicopter', when: '2 hours · today', bar: '40px', barColor: '#CF0090', color: '#0A0A0A', size: '52px' },\n      ],\n      pathRows: [\n        { who: 'You, now', stage: 'Helicopter', text: 'Ship features using the loop. Prove it works on your service.', accent: '#CF0090', bg: '#FFF5FB', tagColor: '#CF0090', nameColor: '#CF0090' },\n        { who: 'The team, next', stage: 'Commercial pilot', text: 'The loop becomes the default. Specs become the interface between roles.', accent: '#E0E0E0', bg: 'transparent', tagColor: '#B5B5B5', nameColor: '#0A0A0A' },\n        { who: 'The org, eventually', stage: 'Astronaut', text: 'Headcount models change. The company operates differently.', accent: '#E0E0E0', bg: 'transparent', tagColor: '#B5B5B5', nameColor: '#0A0A0A' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
